<script>
// ─── TTS ──────────────────────────────────────────────────
let greekVoice=null;
function loadVoice(){const v=speechSynthesis.getVoices();greekVoice=v.find(x=>x.lang==='el-GR')||v.find(x=>x.lang==='el')||v.find(x=>x.lang.startsWith('el'))||null;}
if(window.speechSynthesis){loadVoice();speechSynthesis.onvoiceschanged=loadVoice;}
// Remove all Cyrillic characters and cleanup for Greek TTS
function stripNonGreek(text){
  return text
    .replace(/[а-яёА-ЯЁ]+/g,'') // remove Cyrillic
    .replace(/\([^)]*\)/g,'')   // remove parentheses content
    .replace(/→/g,'')             // remove arrows
    .replace(/—/g,'')             // remove dashes
    .replace(/\s+/g,' ')         // normalize spaces
    .trim();
}

function speak(text){
  if(!window.speechSynthesis)return;
  const clean=stripNonGreek(text);
  if(!clean)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(clean);
  u.lang='el-GR';u.rate=0.82;u.pitch=1;
  if(greekVoice)u.voice=greekVoice;
  speechSynthesis.speak(u);
}

function speakList(texts){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  texts.forEach((text,i)=>{
    const clean=stripNonGreek(text);
    if(!clean)return;
    const u=new SpeechSynthesisUtterance(clean);
    u.lang='el-GR';u.rate=0.75;u.pitch=1;
    if(greekVoice)u.voice=greekVoice;
    speechSynthesis.speak(u);
    if(i<texts.length-1){
      const pause=new SpeechSynthesisUtterance(' ');
      pause.lang='el-GR';pause.volume=0;pause.rate=0.1;
      speechSynthesis.speak(pause);
    }
  });
}

// ─── LOCALSTORAGE ─────────────────────────────────────────
const LS={
  get(k,d){try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch(e){return d;}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
};

function unitTotalItems(uid) {
  const unit = SECTIONS.flatMap(s=>s.units).find(u=>u.id===uid);
  if(!unit) return 0;
  const words = unit.words.length;
  const fills = FILL_EXERCISES.filter(f=>f.unitId===uid).length;
  const listens = LISTEN_EXERCISES.filter(l=>l.unitId===uid).reduce((a,l)=>a+l.questions.length,0);
  const theories = THEORY_CARDS.filter(t=>t.unitId===uid).length;
  return words + fills + listens + theories;
}

// Increment this number every time you add new exercises to existing units
const APP_VERSION = 4;

function recalcUnitScore(uid, oldScore) {
  if(oldScore === 0) return 0;
  const current = unitTotalItems(uid);
  // Get what was saved when user last completed this unit
  const savedCount = LS.get('unitTotalItems_'+uid, null);
  if(savedCount === null) {
    // Never saved - just store current count, don't change score
    LS.set('unitTotalItems_'+uid, current);
    return oldScore;
  }
  if(current > savedCount) {
    // New exercises added since user last did this unit
    // Scale score down proportionally
    const newScore = Math.round(oldScore * savedCount / current);
    LS.set('unitTotalItems_'+uid, current);
    return newScore;
  }
  return oldScore;
}

// ─── PROGRESS CALC ────────────────────────────────────────
function unitProgress(uid){return S.unitScores[uid]||0;}

function sectionProgress(sec){
  const units=sec.units;
  const totalW=units.reduce((a,u)=>a+u.words.length,0);
  if(!totalW)return 0;
  const weighted=units.reduce((a,u)=>{
    const pct=unitProgress(u.id)/100;
    return a+pct*u.words.length;
  },0);
  return Math.round((weighted/totalW)*100);
}

function bookProgress(){
  const totalW=ALL_WORDS.length;
  if(!totalW)return 0;
  const weighted=SECTIONS.flatMap(s=>s.units).reduce((a,u)=>{
    const pct=unitProgress(u.id)/100;
    return a+pct*u.words.length;
  },0);
  return Math.round((weighted/totalW)*100);
}

// ─── BUILD EXERCISE ───────────────────────────────────────
function buildEx(word,pool,forceType){
  const others=pool.filter(w=>w.id!==word.id);
  const fb=ALL_WORDS.filter(w=>w.id!==word.id);
  const src=others.length>=3?others:fb;
  const types=["FC","C4","WRITE","MATCH"];
  const type=forceType||types[Math.floor(Math.random()*types.length)];
  if(type==="MATCH"){
    const pairs=shuffle([word,...pick(src,3)]).slice(0,4);
    return{type,word,pairs,ll:shuffle(pairs.map(p=>p.greek)),rl:shuffle(pairs.map(p=>p.ru))};
  }
  if(type==="FC")return{type,word,dir:Math.random()>.5?'grToRu':'ruToGr'};
  return{type,word,opts:shuffle([word,...pick(src,3)])};
}

// ─── PRACTICE WORDS (only checked, not learned) ───────────
function pracWords(){return ALL_WORDS.filter(w=>S.checked.has(w.id)&&!S.learned.has(w.id));}

function buildPEx(){
  const pw=pracWords();
  if(!pw.length){S.pEx=null;return;}
  const word=pw[Math.floor(Math.random()*pw.length)];
  const others=pw.filter(w=>w.id!==word.id);
  // MATCH only if 4+ checked words available
  const canMatch=pw.length>=4;
  const r=Math.random();
  if(!canMatch||r<0.5){
    S.pEx={t:'FC',word,dir:Math.random()>.5?'grToRu':'ruToGr'};S.pFcRev=false;
  } else {
    // MATCH only with checked (practice) words
    const pairs=shuffle([word,...pick(others,3)]).slice(0,4);
    S.pEx={t:'MA',word,pairs,ll:shuffle(pairs.map(p=>p.greek)),rl:shuffle(pairs.map(p=>p.ru))};
    S.pMSelL=null;S.pMSelR=null;S.pMDone=[];S.pMWrong=[];
  }
}

function render(){
  const app=document.getElementById('app');
  // Remember which input was focused before re-render
  const focusedId=document.activeElement?.dataset?.persist;
  const focusedVal=document.activeElement?.value;
  app.innerHTML='';
  const nav=el('div','nav');
  [['learn','🎓','Учиться'],['words','📖','Слова'],['practice','⚡','Практика'],['phonics','🔤','Фонетика']].forEach(([id,icon,label])=>{
    const btn=el('button','nt'+(S.tab===id?' on':''));
    btn.innerHTML=`<span class="ni">${icon}</span>${label}`;
    btn.onclick=()=>{S.tab=id;save();if(id==='practice'&&!S.pEx)buildPEx();render();};
    nav.appendChild(btn);
  });
  app.appendChild(nav);
  if(S.tab==='learn')app.appendChild(S.mode==='home'?renderHome():renderUnitEx());
  if(S.tab==='words')app.appendChild(renderWords());
  if(S.tab==='practice')app.appendChild(renderPractice());
  if(S.tab==='phonics')app.appendChild(renderPhonics());
  if(S.popup)app.appendChild(renderPopup());
  if(S.toast){const t=el('div','toast');t.textContent=S.toast;app.appendChild(t);}
  // Restore focus to search inputs
  if(focusedId){
    const el2=document.querySelector(`[data-persist="${focusedId}"]`);
    if(el2){el2.focus();if(focusedVal!==undefined){el2.value=focusedVal;el2.setSelectionRange(focusedVal.length,focusedVal.length);}}
  }
}

function startUnit(unit){
  const sess=LS.get('session',null);
  if(sess&&sess.unitId===unit.id&&sess.qi<sess.queue.length){

    S.queue=sess.queue.map(item=>{
      if(!item)return null;
      if(item.type==='FILL_SLOT'||item.type==='LISTEN_SLOT'||item.type==='THEORY_SLOT')return item;
      return ALL_WORDS.find(w=>w.id===item);
    }).filter(Boolean);
    S.qi=sess.qi;
    S.score=sess.score||{c:0,w:0,st:0};
    S.errs=sess.errs.map(id=>ALL_WORDS.find(w=>w.id===id)).filter(Boolean);
    S.answers=sess.answers||[];
  } else {
    S.activeUnit=unit;
    // Build mixed queue: theory first (for grammar unit), then words + fill + listen
    const wordQueue=shuffle(unit.words);
    const fills=FILL_EXERCISES.filter(f=>f.unitId===unit.id);
    const listens=LISTEN_EXERCISES.filter(l=>l.unitId===unit.id);
    const theories=THEORY_CARDS.filter(t=>t.unitId===unit.id);

    let mixed=[];
    // Theory cards always go first
    theories.forEach(t=>mixed.push({type:'THEORY_SLOT',theoryId:t.id}));
    // Then words
    mixed=[...mixed,...wordQueue];
    // Insert fill exercises at intervals after theory
    const theoryCount=theories.length;
    fills.forEach((f,i)=>{
      const base=theoryCount;
      const pos=Math.min(base+Math.floor((i+1)*(wordQueue.length)/(fills.length+1)),mixed.length);
      mixed.splice(pos,0,{type:'FILL_SLOT',fillId:f.id});
    });
    // Listen at end
    listens.forEach(l=>mixed.push({type:'LISTEN_SLOT',listenId:l.id,qIdx:0}));
    S.queue=mixed;S.qi=0;
    S.score={c:0,w:0,st:0};S.errs=[];S.answers=[];
  }
  S.mode='unit';nextEx();render();
}

function prevEx(){
  if(S.qi<=0)return;
  S.qi--;
  const item=S.queue[S.qi];
  if(item&&item.type==='THEORY_SLOT'){
    const t=THEORY_CARDS.find(x=>x.id===item.theoryId);
    if(t){S.ex={type:'THEORY',theory:t};}
    else{S.qi--;prevEx();return;}
  } else if(item&&item.type==='FILL_SLOT'){
    const f=FILL_EXERCISES.find(x=>x.id===item.fillId);
    if(f){S.ex={type:'FILL',fillId:f.id,sentence:f.sentence,hint:f.hint,answer:f.answer,options:shuffle(f.options),translation:f.translation,emoji:f.emoji};}
    else{S.qi--;prevEx();return;}
  } else if(item&&item.type==='LISTEN_SLOT'){
    const l=LISTEN_EXERCISES.find(x=>x.id===item.listenId);
    if(l){S.ex={type:'LISTEN',listenId:l.id,listen:l,qIdx:0};}
    else{S.qi--;prevEx();return;}
  } else {
    S.ex=buildEx(item,S.queue.filter(x=>x&&!x.type));
  }
  S.fcRev=false;S.chosen=null;S.c4checked=false;S.fillChosen=null;S.fillChecked=false;
  S.listenChosen=null;S.listenChecked=false;
  S.mSelGr=null;S.mSelRu=null;S.mDone=[];S.mWrong=[];S.mDoneAll=false;S.mWrongCount=0;
  // Undo last score change
  if(S.answers&&S.answers.length>0){
    const last=S.answers.pop();
    if(last==='ok')S.score.c=Math.max(0,S.score.c-1);
    else S.score.w=Math.max(0,S.score.w-1);
  }
  save();render();
}

function nextEx(){
  if(S.qi>=S.queue.length)return;
  const item=S.queue[S.qi];
  if(item&&item.type==='THEORY_SLOT'){
    const t=THEORY_CARDS.find(x=>x.id===item.theoryId);
    if(t){S.ex={type:'THEORY',theory:t};}
    else{S.qi++;nextEx();return;}
  } else if(item&&item.type==='FILL_SLOT'){
    const f=FILL_EXERCISES.find(x=>x.id===item.fillId);
    if(f){
      S.ex={type:'FILL',fillId:f.id,sentence:f.sentence,hint:f.hint,
        answer:f.answer,options:shuffle(f.options),translation:f.translation,emoji:f.emoji};
    } else { S.qi++; nextEx(); return; }
  } else if(item&&item.type==='LISTEN_SLOT'){
    const l=LISTEN_EXERCISES.find(x=>x.id===item.listenId);
    if(l){
      S.listenQIdx=item.qIdx||0;
      S.ex={type:'LISTEN',listenId:l.id,listen:l,qIdx:S.listenQIdx};
    } else { S.qi++; nextEx(); return; }
  } else {
    const word=item;
    S.ex=buildEx(word,S.queue.filter(x=>x&&!x.type));
  }
  S.fcRev=false;S.chosen=null;S.c4checked=false;S.fillChosen=null;S.fillChecked=false;S.listenChosen=null;S.listenChecked=false;
  S.wv='';S.ws=null;
  S.mSelGr=null;S.mSelRu=null;S.mDone=[];S.mWrong=[];S.mDoneAll=false;S.mWrongCount=0;
}

function advance(ok){
  S.score.c+=ok?1:0;S.score.w+=ok?0:1;S.score.st=ok?S.score.st+1:0;
  if(!S.answers)S.answers=[];
  S.answers.push(ok?'ok':'err');
  if(!ok&&S.ex?.word){
    S.errs.push(S.ex.word);
    if(!S.checked.has(S.ex.word.id)){
      S.checked.add(S.ex.word.id);
    }
  }
  S.qi++;
  save();
  if(S.qi<S.queue.length){nextEx();render();}
  else{
    const pct=Math.round((S.score.c/(S.score.c+S.score.w||1))*100);
    S.unitScores[S.activeUnit.id]=pct;
    // Save current total items count for future recalc
    LS.set('unitTotalItems_'+S.activeUnit.id, unitTotalItems(S.activeUnit.id));
    // Save errors for retry button on home screen
    if(S.errs.length>0){
      LS.set('unitErrs_'+S.activeUnit.id, S.errs.map(w=>w.id));
    } else {
      LS.set('unitErrs_'+S.activeUnit.id, []);
    }
    LS.set('session',null);
    save();render();
  }
}

    qNum.textContent='Вопрос '+(qIdx+1)+' из '+l.questions.length;qCard.appendChild(qNum);
    const qText=el('div');qText.style.cssText='font-size:16px;font-weight:800;margin-bottom:4px';
    qText.textContent=q.q;qCard.appendChild(qText);
    const qRu=el('div');qRu.style.cssText='font-size:13px;color:var(--mu);font-weight:600';
    qRu.textContent=q.qRu;qCard.appendChild(qRu);
    ew.appendChild(qCard);

    // Options
    const chs=el('div','chs');
    q.options.forEach(opt=>{
      let cls='cb2';
      if(S.listenChecked){if(opt===q.answer)cls+=' ck';else if(opt===S.listenChosen)cls+=' cw';}
      else if(S.listenChosen===opt)cls+=' ms';
      const b=el('button',cls);b.textContent=opt;
      if(S.listenChecked)b.disabled=true;
      b.onclick=()=>{if(!S.listenChecked){S.listenChosen=opt;render();}};
      chs.appendChild(b);
    });
    ew.appendChild(chs);

    if(!S.listenChecked){
      if(S.listenChosen){
        const chk=el('button','btn bpr bfw');chk.textContent='Проверить';
        chk.onclick=()=>{S.listenChecked=true;render();};ew.appendChild(chk);
      }
    } else {
      const isOk=S.listenChosen===q.answer;
      const fb=el('div','fb '+(isOk?'fbok':'fber'));
      fb.textContent=isOk?'✅ Верно!':'❌ Правильно: '+q.answer;ew.appendChild(fb);
      const nb=el('button','btn bpr bfw');
      if(!isLast){
        nb.textContent='Следующий вопрос →';
        nb.onclick=()=>{
          // Next question in same listen exercise - replace queue slot
          S.queue[S.qi]={type:'LISTEN_SLOT',listenId:l.id,qIdx:qIdx+1};
          S.listenChecked=false;S.listenChosen=null;
          nextEx();render();
        };
      } else {
        nb.textContent='Дальше →';
        nb.onclick=()=>{S.listenChecked=false;S.listenChosen=null;advance(isOk);};
      }
      ew.appendChild(nb);
    }
  }

  else if(type==='FILL'){
    const lbl=el('div','ex');lbl.textContent='Заполни пропуск';ew.appendChild(lbl);
    const card=el('div','card');
    // Show sentence
    const sentRow=el('div');sentRow.style.cssText='display:flex;align-items:flex-start;gap:10px;margin-bottom:10px';
    const sent=el('div');sent.style.cssText='font-size:18px;font-weight:800;line-height:1.6;color:var(--txt);flex:1';
    sent.textContent=S.ex.sentence;
    const sentSpk=el('button','spk');sentSpk.textContent='🔊';sentSpk.style.flexShrink='0';sentSpk.style.marginTop='4px';
    sentSpk.onclick=()=>speak(S.ex.sentence);
    sentRow.appendChild(sent);sentRow.appendChild(sentSpk);card.appendChild(sentRow);
    // Translation hint
    const tr=el('div');tr.style.cssText='font-size:13px;color:var(--mu);font-weight:600;margin-bottom:8px';
    tr.textContent=S.ex.translation;card.appendChild(tr);
    if(S.ex.hint){
      const h=el('div');h.style.cssText='font-size:12px;color:var(--acc);font-weight:700;background:#ede9fe;border-radius:8px;padding:6px 10px;display:inline-block';
      h.textContent='💡 '+S.ex.hint;card.appendChild(h);
    }
    ew.appendChild(card);
    // Options
    const chs=el('div','chs');
    S.ex.options.forEach(opt=>{
      let cls='cb2';
      if(S.fillChecked){
        if(opt===S.ex.answer)cls+=' ck';
        else if(opt===S.fillChosen&&opt!==S.ex.answer)cls+=' cw';
      } else if(S.fillChosen===opt) cls+=' ms';
      const b=el('button',cls);b.textContent=opt;
      if(S.fillChecked)b.disabled=true;
      b.onclick=()=>{if(!S.fillChecked){S.fillChosen=opt;render();}};
      chs.appendChild(b);
    });
    ew.appendChild(chs);
    if(!S.fillChecked){
      if(S.fillChosen){
        const chk=el('button','btn bpr bfw');chk.textContent='Проверить';
        chk.onclick=()=>{S.fillChecked=true;render();};ew.appendChild(chk);
      }
    } else {
      const isOk=S.fillChosen===S.ex.answer;
      const fb=el('div','fb '+(isOk?'fbok':'fber'));
      fb.textContent=isOk?'✅ Верно!':'❌ Правильно: '+S.ex.answer;
      ew.appendChild(fb);
      const nb=el('button','btn bpr bfw');nb.textContent='Дальше →';
      nb.onclick=()=>{S.fillChecked=false;S.fillChosen=null;advance(isOk);};
      ew.appendChild(nb);
    }
  }

  return ew;
}

function doWrite(){
  const ok=S.wv.trim().toLowerCase()===S.ex.word.greek.toLowerCase();
  S.ws=ok?'ok':'fl';render();setTimeout(()=>advance(ok),1300);
}

function handleMGr(gr){
  speak(gr);if(S.mDone.includes(gr))return;
  // Deselect if already selected
  if(S.mSelGr===gr){S.mSelGr=null;render();return;}
  if(S.mSelRu){
    const pair=S.ex.pairs.find(p=>p.greek===gr);
    if(pair&&pair.ru===S.mSelRu){S.mDone=[...S.mDone,gr];S.mSelGr=null;S.mSelRu=null;if(S.mDone.length===S.ex.pairs.length)S.mDoneAll=true;}
    else{S.mWrongCount=(S.mWrongCount||0)+1;S.mWrong=[gr,S.mSelRu];setTimeout(()=>{S.mWrong=[];S.mSelGr=null;S.mSelRu=null;render();},700);}
  }else S.mSelGr=gr;render();
}
function handleMRu(ru){
  const pGr=S.ex.pairs.find(p=>p.ru===ru)?.greek;if(S.mDone.includes(pGr))return;
  // Deselect if already selected
  if(S.mSelRu===ru){S.mSelRu=null;render();return;}
  if(S.mSelGr){
    const pair=S.ex.pairs.find(p=>p.greek===S.mSelGr);
    if(pair&&pair.ru===ru){S.mDone=[...S.mDone,S.mSelGr];S.mSelGr=null;S.mSelRu=null;if(S.mDone.length===S.ex.pairs.length)S.mDoneAll=true;}
    else{S.mWrongCount=(S.mWrongCount||0)+1;S.mWrong=[S.mSelGr,ru];setTimeout(()=>{S.mWrong=[];S.mSelGr=null;S.mSelRu=null;render();},700);}
  }else S.mSelRu=ru;render();
}

// ─── WORDS ────────────────────────────────────────────────
function renderWords(){
  const sc=el('div','sc');
  // Section tabs
  const stabs=el('div');stabs.style.cssText='display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px';
  const secIds=['all',...SECTIONS.map(s=>s.id)];
  const secLabels=['Все',...SECTIONS.map(s=>s.subtitle||s.title)];
  secIds.forEach((sid,i)=>{
    const tb=el('button','ptab'+(S.wlSection===sid||(!S.wlSection&&sid==='all')?' on':''));
    tb.textContent=secLabels[i];tb.style.whiteSpace='nowrap';
    tb.onclick=()=>{S.wlSection=sid;S.wlPage=0;render();};
    stabs.appendChild(tb);
  });
  sc.appendChild(stabs);
  const secWords=(!S.wlSection||S.wlSection==='all')?ALL_WORDS:ALL_WORDS.filter(w=>{
    const sec=SECTIONS.find(s=>s.units.some(u=>u.words.some(uw=>uw.id===w.id)));
    return sec&&sec.id===S.wlSection;
  });
  const q=S.wlSearch.toLowerCase();
  const filtered=secWords.filter(w=>!q||w.greek.toLowerCase().includes(q)||w.ru.toLowerCase().includes(q));
  const totalPages=Math.ceil(filtered.length/PER_PAGE);
  if(S.wlPage>=totalPages)S.wlPage=0;
  const pageWords=filtered.slice(S.wlPage*PER_PAGE,(S.wlPage+1)*PER_PAGE);
  const allCk=pageWords.length>0&&pageWords.every(w=>S.checked.has(w.id));

  const wlt=el('div','wlt');
  const inp=el('input','wls');inp.placeholder='Поиск...';inp.value=S.wlSearch;inp.dataset.persist='wl-search';
  inp.oninput=e=>{S.wlSearch=e.target.value;S.wlPage=0;render();};
  wlt.appendChild(inp);
  const eb=el('button','wleb');eb.textContent='↓ Конец';
  eb.onclick=()=>document.getElementById('wl-end')?.scrollIntoView({behavior:'smooth'});
  wlt.appendChild(eb);sc.appendChild(wlt);

  const sar=el('div','sar');
  const cb=el('input');cb.type='checkbox';cb.className='cb3';cb.checked=allCk;
  cb.onchange=()=>{const ids=pageWords.map(w=>w.id);ids.forEach(id=>allCk?S.checked.delete(id):S.checked.add(id));save();render();};
  sar.appendChild(cb);
  const sal=el('span');sal.textContent='Выбрать все на стр.';sar.appendChild(sal);
  const sc2=el('span');sc2.style.cssText='margin-left:auto;color:var(--acc);font-weight:800';
  sc2.textContent=`⚡ ${S.checked.size} в практике`;sar.appendChild(sc2);
  sc.appendChild(sar);

  const groups={};
  pageWords.forEach(w=>{(groups[w.cat]=groups[w.cat]||[]).push(w);});
  Object.entries(groups).forEach(([cat,words])=>{
    const cl=el('div','cl');cl.textContent=`${cat} (${words.length})`;sc.appendChild(cl);
    words.forEach(w=>{
      const wr=el('div','wr');
      const wc=el('input');wc.type='checkbox';wc.className='cb3';wc.checked=S.checked.has(w.id);
      wc.onchange=()=>{S.checked.has(w.id)?S.checked.delete(w.id):S.checked.add(w.id);save();render();};
      const we=el('div','we');we.textContent=w.emoji;
      const wg=el('div','wg');wg.textContent=w.greek;
      const wru=el('div','wru');wru.textContent=w.ru;
      const wsp=el('button','wsp');wsp.textContent='🔊';wsp.onclick=()=>speak(w.greek);
      wr.appendChild(wc);wr.appendChild(we);wr.appendChild(wg);wr.appendChild(wru);wr.appendChild(wsp);
      sc.appendChild(wr);
    });
  });

  const endDiv=el('div');endDiv.id='wl-end';sc.appendChild(endDiv);
  if(totalPages>1){
    const pn=el('div','pn');
    for(let i=0;i<totalPages;i++){
      const pb=el('button','pgb'+(S.wlPage===i?' pa':''));pb.textContent=i+1;
      pb.onclick=(()=>{const p=i;return()=>{S.wlPage=p;save();render();}; })();
      pn.appendChild(pb);
    }
    sc.appendChild(pn);
  }
  return sc;
}

// ─── PRACTICE ─────────────────────────────────────────────
function renderPractice(){
  const wrap=el('div','sc');

  // TABS
  const tabs=el('div','ptabs');
  const t1=el('button','ptab'+(S.practiceTab==='practice'?' on':''));
  t1.textContent=`⚡ Практика (${pracWords().length})`;
  t1.onclick=()=>{S.practiceTab='practice';save();render();};
  const t2=el('button','ptab'+(S.practiceTab==='learned'?' on':''));
  t2.textContent=`✅ Выученные (${S.learned.size})`;
  t2.onclick=()=>{S.practiceTab='learned';save();render();};
  tabs.appendChild(t1);tabs.appendChild(t2);wrap.appendChild(tabs);

  if(S.practiceTab==='learned'){
    return renderLearnedWords(wrap);
  }

  const pw=pracWords();
  if(!pw.length){
    const pe=el('div','pe');
    pe.innerHTML=`<div style="font-size:52px;margin-bottom:14px">📋</div><div style="font-size:18px;font-weight:800;margin-bottom:8px">Нет слов для практики</div><div style="font-size:14px;font-weight:600">Отметь галочкой в разделе «Слова»</div>`;
    wrap.appendChild(pe);return wrap;
  }
  // Long-press hint
  const hint=el('div');
  hint.style.cssText='display:flex;align-items:center;gap:8px;background:#ede9fe;border-radius:12px;padding:10px 14px;margin-bottom:14px;font-size:13px;font-weight:700;color:var(--acc)';
  hint.innerHTML='👆 Удержи карточку — отметить как выученное';
  wrap.appendChild(hint);
  if(!S.pEx)buildPEx();
  if(!S.pEx)return wrap;

  // FC exercise
  if(S.pEx.t==='FC'){
    const word=S.pEx.word;
    const isGR=S.pEx.dir==='grToRu';
    const card=el('div','card cc');
    // Long press to remove
    card.onmousedown=()=>{lpTimer=setTimeout(()=>{S.popup={word,fromPractice:true};render();},650);};
    card.onmouseup=card.onmouseleave=()=>clearTimeout(lpTimer);
    card.ontouchstart=e=>{lpTimer=setTimeout(()=>{S.popup={word,fromPractice:true};render();},650);};
    card.ontouchend=()=>clearTimeout(lpTimer);

    const em=el('div','be');em.textContent=word.emoji;card.appendChild(em);
    if(isGR){
      const row=el('div');row.style.cssText='display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:4px';
      const w=el('div','bw');w.textContent=word.greek;
      const sb=el('button','spk');sb.textContent='🔊';sb.onclick=e=>{e.stopPropagation();speak(word.greek);};
      row.appendChild(w);row.appendChild(sb);card.appendChild(row);
    }else{
      const w=el('div','bw bwr');w.textContent=word.ru;card.appendChild(w);
    }
    if(!S.pFcRev){
      const btn2=el('button','btn bot');btn2.style.cssText='margin-top:16px;flex:unset;padding:10px 24px';
      btn2.textContent='Показать перевод';
      btn2.onclick=()=>{S.pFcRev=true;render();};card.appendChild(btn2);
    }else{
      const ans=el('div','fca');
      if(isGR){ans.textContent=word.ru;}
      else{
        const row=el('div');row.style.cssText='display:flex;align-items:center;justify-content:center;gap:10px';
        const w=el('span');w.textContent=word.greek;
        const sb=el('button','spk');sb.textContent='🔊';sb.onclick=e=>{e.stopPropagation();speak(word.greek);};
        row.appendChild(w);row.appendChild(sb);ans.appendChild(row);
      }
      card.appendChild(ans);
      const fcr=el('div');fcr.style.cssText='display:flex;flex-direction:column;gap:8px;margin-top:14px';
      const nb=el('button','btn ber');nb.textContent='❌ Не знал';nb.onclick=()=>{buildPEx();render();};
      const kb=el('button','btn bot');kb.textContent='✅ Знаю / вроде помню';
      kb.onclick=()=>{buildPEx();render();};
      const lb=el('button','btn bok');lb.textContent='⭐ Знаю точно — в выученные';
      lb.onclick=()=>{
        const w=S.pEx.word;
        S.learned.add(w.id);S.checked.delete(w.id);
        save();buildPEx();showToast('⭐ Добавлено в выученные!');render();
      };
      fcr.appendChild(nb);fcr.appendChild(kb);fcr.appendChild(lb);card.appendChild(fcr);
    }
    wrap.appendChild(card);
  }

  // MATCH exercise — only checked words
  else if(S.pEx.t==='MA'){

    const mg=el('div','mg');
    const mcL=el('div','mc'),mcR=el('div','mc');
    S.pEx.ll.forEach(gr=>{
      const isD=S.pMDone.includes(gr);
      let cls='mi'+(isD?' mm':S.pMSelL===gr?' ms':S.pMWrong.includes(gr)?' mw':'');
      const d=el('div',cls);d.textContent=gr;
      d.onclick=()=>handlePL(gr);
      const pair=S.pEx.pairs.find(p=>p.greek===gr);
      d.onmousedown=()=>{lpTimer=setTimeout(()=>{S.popup={word:pair,fromPractice:true,fromMatch:gr};render();},650);};
      d.onmouseup=d.onmouseleave=()=>clearTimeout(lpTimer);
      d.ontouchstart=()=>{lpTimer=setTimeout(()=>{S.popup={word:pair,fromPractice:true,fromMatch:gr};render();},650);};
      d.ontouchend=()=>clearTimeout(lpTimer);
      mcL.appendChild(d);
    });
    S.pEx.rl.forEach(ru=>{
      const pGr=S.pEx.pairs.find(p=>p.ru===ru)?.greek;
      const isD=S.pMDone.includes(pGr);
      let cls='mi'+(isD?' mm':S.pMSelR===ru?' ms':S.pMWrong.includes(ru)?' mw':'');
      const d=el('div',cls);d.textContent=ru;d.onclick=()=>handlePR(ru);mcR.appendChild(d);
    });
    mg.appendChild(mcL);mg.appendChild(mcR);wrap.appendChild(mg);
  }

  return wrap;
}

function handlePL(gr){
  speak(gr);if(S.pMDone.includes(gr))return;
  if(S.pMSelL===gr){S.pMSelL=null;render();return;}
  if(S.pMSelR){
    const pair=S.pEx.pairs.find(p=>p.greek===gr);
    if(pair&&pair.ru===S.pMSelR){
      S.pMDone=[...S.pMDone,gr];S.pMSelL=null;S.pMSelR=null;
      if(S.pMDone.length===S.pEx.pairs.length)setTimeout(()=>{buildPEx();render();},600);
    }else{S.pMWrong=[gr,S.pMSelR];setTimeout(()=>{S.pMWrong=[];S.pMSelL=null;S.pMSelR=null;render();},700);}
  }else S.pMSelL=gr;render();
}
function handlePR(ru){
  const pGr=S.pEx.pairs.find(p=>p.ru===ru)?.greek;if(S.pMDone.includes(pGr))return;
  if(S.pMSelR===ru){S.pMSelR=null;render();return;}
  if(S.pMSelL){
    const pair=S.pEx.pairs.find(p=>p.greek===S.pMSelL);
    if(pair&&pair.ru===ru){
      S.pMDone=[...S.pMDone,S.pMSelL];S.pMSelL=null;S.pMSelR=null;
      if(S.pMDone.length===S.pEx.pairs.length)setTimeout(()=>{buildPEx();render();},600);
    }else{S.pMWrong=[S.pMSelL,ru];setTimeout(()=>{S.pMWrong=[];S.pMSelL=null;S.pMSelR=null;render();},700);}
  }else S.pMSelR=ru;render();
}

// ─── LEARNED WORDS TAB ────────────────────────────────────
function renderLearnedWords(wrap){
  if(!S.learned.size){
    const pe=el('div','pe');
    pe.innerHTML=`<div style="font-size:52px;margin-bottom:14px">🎓</div><div style="font-size:18px;font-weight:800;margin-bottom:8px">Нет выученных слов</div><div style="font-size:14px;font-weight:600">Долгое нажатие на слово в практике → убрать → оно появится здесь</div>`;
    wrap.appendChild(pe);return wrap;
  }

  const learnedWords=ALL_WORDS.filter(w=>S.learned.has(w.id));
  const q=S.lwSearch.toLowerCase();
  const filtered=learnedWords.filter(w=>!q||w.greek.toLowerCase().includes(q)||w.ru.toLowerCase().includes(q));

  // Search
  const wlt=el('div','wlt');
  const inp=el('input','wls');inp.placeholder='Поиск в выученных...';inp.value=S.lwSearch;inp.dataset.persist='lw-search';
  inp.oninput=e=>{S.lwSearch=e.target.value;render();};
  wlt.appendChild(inp);wrap.appendChild(wlt);

  // Select all to return
  const allSel=filtered.every(w=>S.checked.has(w.id)&&!S.learned.has(w.id));
  const sar=el('div','sar');
  const cb=el('input');cb.type='checkbox';cb.className='cb3';cb.checked=false;
  cb.onchange=()=>{
    // Return all filtered back to practice
    filtered.forEach(w=>{S.learned.delete(w.id);S.checked.add(w.id);});
    save();showToast('Все слова возвращены в практику');
  };
  sar.appendChild(cb);
  const sal=el('span');sal.textContent='Вернуть все в практику';sar.appendChild(sal);
  wrap.appendChild(sar);

  filtered.forEach(w=>{
    const row=el('div','lw-row');
    const wc=el('input');wc.type='checkbox';wc.className='cb3';wc.checked=false;
    wc.onchange=()=>{S.learned.delete(w.id);S.checked.add(w.id);save();showToast(`${w.greek} возвращено в практику`);};
    const we=el('div','we');we.textContent=w.emoji;
    const wg=el('div','wg');wg.textContent=w.greek;
    const wru=el('div','wru');wru.textContent=w.ru;
    const badge=el('div','lw-badge');badge.textContent='✓ выучено';
    const wsp=el('button','wsp');wsp.textContent='🔊';wsp.onclick=()=>speak(w.greek);
    row.appendChild(wc);row.appendChild(we);row.appendChild(wg);row.appendChild(wru);row.appendChild(badge);row.appendChild(wsp);
    wrap.appendChild(row);
  });
  return wrap;
}

// ─── PHONICS ──────────────────────────────────────────────
function renderPhonics(){
  const sc=el('div','sc');
  PHONICS.forEach(p=>{
    const c=el('div','phc');
    c.innerHTML=`<div class="phs">${p.sound}</div><div class="phl">${p.letters}</div><div class="phe">${p.example}</div>`;
    sc.appendChild(c);
  });
  return sc;
}

// ─── POPUP ────────────────────────────────────────────────
function renderPopup(){
  const po=el('div','po');
  po.onclick=()=>{S.popup=null;render();};
  const pb=el('div','pb2');pb.onclick=e=>e.stopPropagation();
  const pt=el('div','popt');pt.textContent=S.popup.word?.greek||'';pb.appendChild(pt);
  const pu=el('div','popu');pu.textContent='Отметить как выученное?';pb.appendChild(pu);
  const br=el('div','br');
  const nb=el('button','btn bot');nb.textContent='Нет';nb.onclick=()=>{S.popup=null;render();};
  const yb=el('button','btn bok');yb.textContent='⭐ Да, выучил!';
  yb.onclick=()=>{
    const word=S.popup.word;
    const fromMatch=S.popup.fromMatch;
    if(word){
      S.learned.add(word.id);
      S.checked.delete(word.id); // remove from practice, remove checkbox in words
      // If from match, remove pair from current exercise
      if(fromMatch&&S.pEx&&S.pEx.t==='MA'){
        S.pEx.pairs=S.pEx.pairs.filter(p=>p.greek!==fromMatch);
        S.pEx.ll=S.pEx.ll.filter(g=>g!==fromMatch);
        S.pEx.rl=S.pEx.rl.filter(r=>r!==word.ru);
        S.pMDone=S.pMDone.filter(g=>g!==fromMatch);
        if(S.pEx.pairs.length===0){buildPEx();}
      } else {
        buildPEx();
      }
    }
    S.popup=null;save();showToast('⭐ Добавлено в выученные!');
  };
  br.appendChild(nb);br.appendChild(yb);pb.appendChild(br);po.appendChild(pb);
  return po;
}

// ─── INIT ─────────────────────────────────────────────────
// Version migration: preserve user progress across updates
// We never wipe localStorage - only add new words to checked
(function migrate(){
  const currentIds=new Set(ALL_IDS);
  const savedChecked=new Set(LS.get('checked',null)||ALL_IDS);
  // Add any new word IDs that weren't in previous version
  ALL_IDS.forEach(id=>{
    if(!savedChecked.has(id)){savedChecked.add(id);}
  });
  S.checked=savedChecked;
  LS.set('checked',[...savedChecked]);
})();
render();
