<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8"/>
<meta name="version" content="1775997680"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>🇬🇷 Ελληνικά A1</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  /* Backgrounds */
  --bg:#f0f4ff;--sur:#ffffff;--card:#ffffff;--card2:#f7f9ff;
  /* Accent colors */
  --acc:#4f46e5;--acc2:#ef4444;--acc3:#f59e0b;--acc4:#10b981;
  /* Text */
  --txt:#1e1b4b;--mu:#6b7280;
  /* Status */
  --ok:#10b981;--er:#ef4444;
  /* Misc */
  --r:16px;--shadow:0 2px 12px rgba(79,70,229,.10);
  /* Component colors */
  --border:#e0e7ff;
  --sur2:#f0f4ff;
  --acc-light:#ede9fe;
  --acc-mid:#c4b5fd;
  --acc-soft:#818cf8;
  --ok-light:#d1fae5;--ok-dark:#065f46;
  --er-light:#fee2e2;--er-dark:#991b1b;
  /* Nav */
  --nav-bg:#ffffff;--nav-border:#e0e7ff;
  /* Segments */
  --seg-ok:#10b981;--seg-er:#ef4444;--seg-cur:#818cf8;--seg-empty:#e0e7ff;
  /* Mini player */
  --mp-bg:#f0f4ff;--mp-bar:#c7d2fe;
  /* Misc component */
  --spk-bg:#e0e7ff;
  --hint-bg:#ede9fe;--hint-txt:#4f46e5;
  --sh-grad:linear-gradient(135deg,#ede9fe,#e0e7ff);
  --last-unit-bg:linear-gradient(90deg,#ede9fe 0%,#f8f7ff 100%);
  --last-unit-border:#4f46e5;
  --pg-fill:linear-gradient(90deg,#4f46e5,#818cf8);
  --popup-bg:rgba(30,27,75,.4);
}

/* ── NIGHT / IRON MAN THEME ── */
.dark{
  --bg:#141414;--sur:#1e1e1e;--card:#252525;--card2:#2d2d2d;
  --acc:#e74c3c;--acc2:#c0392b;--acc3:#f0b429;--acc4:#f0b429;
  --txt:#f0e6d3;--mu:#9a8a7a;
  --ok:#f0b429;--er:#ff4444;
  --shadow:0 2px 16px rgba(0,0,0,.5);
  --border:#3a3a3a;
  --sur2:#1a1a1a;
  --acc-light:#2a0a08;--acc-mid:#c0392b;--acc-soft:#e74c3c;
  --ok-light:#2a1a00;--ok-dark:#f0b429;
  --er-light:#2a0000;--er-dark:#ff6666;
  --nav-bg:#1a0a0a;--nav-border:#3a2020;
  --seg-ok:#f0b429;--seg-er:#c0392b;--seg-cur:#e74c3c;--seg-empty:#2a2a2a;
  --mp-bg:#1e1414;--mp-bar:#3a2020;
  --spk-bg:#3a2020;
  --hint-bg:#2a0a08;--hint-txt:#f0b429;
  --sh-grad:linear-gradient(135deg,#2a0a08,#1e1e1e);
  --last-unit-bg:linear-gradient(90deg,#2a0a08 0%,#1e1e1e 100%);
  --last-unit-border:#f0b429;
  --pg-fill:linear-gradient(90deg,#c0392b,#f0b429);
  --popup-bg:rgba(0,0,0,.75);
}

body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}

/* NAV TOP */
.nav{background:#ffffff;border-bottom:2px solid var(--border);display:flex;padding:8px 6px 0;flex-shrink:0;box-shadow:var(--shadow)}
.nt{flex:1;padding:10px 2px 9px;background:none;border:none;border-bottom:3px solid transparent;
  color:var(--mu);font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:4px;text-transform:uppercase;
  letter-spacing:.5px;transition:color .2s,border-color .2s}
.nt.on{color:var(--acc);border-bottom-color:var(--acc)}
.ni{font-size:20px}

/* SCROLL */
.sc{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.sc::-webkit-scrollbar{width:3px}
.sc::-webkit-scrollbar-thumb{background:rgba(79,70,229,.2);border-radius:2px}

/* PROGRESS */
.pb-wrap{flex:1;height:8px;background:var(--border);border-radius:99px;overflow:hidden}
.pb-fill{height:100%;background:var(--pg-fill);border-radius:99px;transition:width .5s}
.ps{background:var(--sur);padding:8px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.pt2{font-size:12px;color:var(--mu);white-space:nowrap;font-weight:700}

/* SCORES */
.sco{display:flex;gap:8px;padding:10px 14px;background:var(--sur);border-bottom:1px solid var(--border);flex-shrink:0}
.chip{background:var(--bg);border-radius:99px;padding:5px 13px;font-size:13px;font-weight:800;display:flex;align-items:center;gap:5px;border:1.5px solid var(--border)}
.g{color:var(--ok)}.r{color:var(--er)}.y{color:var(--acc3)}.b{color:var(--acc)}

/* CARDS */
.card{background:var(--sur);border-radius:var(--r);padding:24px;border:1.5px solid var(--border);box-shadow:var(--shadow);border-color:var(--border)}
.cc{text-align:center}
.be{font-size:64px;margin-bottom:10px;line-height:1}
.bw{font-family:'Nunito',sans-serif;font-size:28px;font-weight:900;line-height:1.3;color:var(--txt)}
.bwr{color:var(--acc)}
.spk{background:var(--spk-bg);border:none;font-size:20px;cursor:pointer;padding:6px 10px;border-radius:12px;transition:background .15s}
.spk:active{background:var(--spk-active)}
.fca{margin-top:16px;padding:14px 20px;background:var(--acc-light);border:2px solid #c4b5fd;
  border-radius:12px;font-size:22px;font-weight:800;color:var(--acc);animation:fi .3s ease}
.fcr{display:flex;gap:10px;margin-top:14px}

/* CHOICES */
.chs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.cb2{padding:16px 10px;background:var(--card);border:2px solid var(--border);border-radius:14px;
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:var(--txt);cursor:pointer;transition:all .2s;text-align:center;box-shadow:var(--shadow);touch-action:manipulation}
.cb2:disabled{cursor:default}
.cb2.ck{border-color:var(--ok);background:var(--ok-light);color:var(--ok-dark)}
.cb2.cw{border-color:var(--er);background:var(--er-light);color:var(--er-dark)}
.cb2.ms{border-color:var(--acc);background:var(--acc-light);color:var(--acc);border-width:2.5px;font-weight:800;box-shadow:0 0 0 3px rgba(79,70,229,.15)}

/* WRITE */
.wi{width:100%;padding:15px;background:var(--card);border:2px solid var(--border);
  border-radius:14px;font-family:'Nunito',sans-serif;font-size:18px;color:var(--txt);outline:none;transition:border-color .2s;font-weight:700}
.wi:focus{border-color:var(--acc)}
.wi.wok{border-color:var(--ok);background:var(--ok-light)}
.wi.wfl{border-color:var(--er);background:var(--er-light)}
.fb{padding:13px 16px;border-radius:12px;font-size:14px;font-weight:700;animation:fi .3s;margin-top:8px}
.fbok{background:var(--ok-light);color:var(--ok-dark)}
.fber{background:var(--fb-er-bg);color:var(--fb-er-color)}
.swl{font-size:13px;color:var(--acc);cursor:pointer;text-decoration:underline;text-align:right;margin-top:8px;font-weight:700}

/* MATCH */
.mg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mg-row{display:contents}
.mc{display:contents}
.mi{padding:13px;background:var(--card);border:2px solid var(--border);border-radius:12px;
  font-size:14px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s;user-select:none;box-shadow:var(--shadow);min-height:52px;display:flex;align-items:center;justify-content:center}
.mi.ms{border-color:var(--acc);background:var(--acc-light);color:var(--acc);border-width:2.5px;font-weight:800}
.mi.mm{border-color:var(--ok);background:var(--ok-light);color:var(--ok-dark);opacity:.8}
.mi.mw{border-color:var(--er);background:var(--er-light)}

/* BUTTONS */
.btn{padding:15px;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:15px;
  font-weight:800;cursor:pointer;flex:1;transition:transform .15s,box-shadow .15s;box-shadow:var(--shadow)}
.btn:active{transform:scale(.96)}
.bok{background:var(--ok);color:#fff}
.ber{background:var(--er);color:#fff}
.bpr{background:var(--acc);color:#fff}
.bot{background:var(--card);border:2px solid var(--border);color:var(--txt)}
.bfw{width:100%}
.br{display:flex;gap:10px}
.ex{font-size:11px;font-weight:800;letter-spacing:2px;color:var(--acc);text-transform:uppercase;margin-bottom:10px}
.ew{display:flex;flex-direction:column;gap:14px}

/* SECTION/UNIT */
.sb{background:var(--sur);border-radius:var(--r);margin-bottom:14px;overflow:hidden;border:1.5px solid var(--border);box-shadow:var(--shadow);border-color:var(--border)}
.sh{padding:16px;display:flex;align-items:center;gap:12px;background:var(--sh-grad)}
.st{font-size:14px;font-weight:900;color:var(--acc)}
.ss{font-size:12px;color:var(--mu);margin-top:2px;font-weight:600}
.ur{padding:14px 16px;display:flex;align-items:center;gap:12px;border-top:1px solid var(--card2);cursor:pointer;transition:background .15s}
.ur:active{background:var(--card2)}
.ue{font-size:24px;width:30px;text-align:center}
.ui{flex:1}
.ut{font-size:14px;font-weight:800;color:var(--txt)}
.us{font-size:12px;color:var(--mu);margin-top:2px;font-weight:600}
.ub{background:var(--acc-light);border-radius:99px;padding:4px 10px;font-size:12px;color:var(--acc);font-weight:800}
.sb2{background:var(--acc);border:none;border-radius:99px;padding:7px 16px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;color:#fff;cursor:pointer}

/* LAST ACTIVE UNIT */
.ur.last-unit{background:var(--last-unit-bg);border-left:3px solid var(--last-unit-border);}

/* UNIT PROGRESS BADGE */
.upct{font-size:12px;font-weight:800;color:var(--ok);margin-right:6px}

/* WORD LIST */
.wlt{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.wls{flex:1;padding:11px 14px;background:var(--card);border:2px solid var(--border);border-radius:12px;font-family:'Nunito',sans-serif;font-size:14px;color:var(--txt);outline:none;font-weight:600}
.wls::placeholder{color:var(--mu)}
.wleb{padding:10px 14px;background:var(--acc);border:none;border-radius:12px;font-size:13px;font-weight:800;color:#fff;cursor:pointer;white-space:nowrap}
.cl{font-size:11px;font-weight:800;letter-spacing:2px;color:var(--mu);text-transform:uppercase;padding:12px 0 6px;border-bottom:1.5px solid var(--border);margin-bottom:6px}
.wr{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--card2)}
.we{font-size:22px;width:28px;text-align:center}
.wg{font-size:15px;font-weight:800;flex:1;color:var(--txt)}
.wru{font-size:13px;color:var(--mu);margin-right:4px;font-weight:600}
.wsp{background:var(--spk-bg);border:none;font-size:16px;cursor:pointer;padding:4px 8px;border-radius:8px;color:var(--acc)}
.cb3{width:19px;height:19px;accent-color:var(--acc);cursor:pointer;flex-shrink:0}
.pn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 0;flex-wrap:wrap}
.pgb{width:34px;height:34px;border-radius:10px;border:2px solid var(--border);background:var(--card);color:var(--txt);font-size:13px;font-weight:800;cursor:pointer}
.pgb.pa{background:var(--acc);color:#fff;border-color:var(--acc)}
.sar{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;color:var(--mu);font-weight:700}

/* PRACTICE TABS */
.ptabs{display:flex;gap:6px;margin-bottom:14px}
.ptab{flex:1;padding:10px;background:var(--card);border:2px solid var(--border);border-radius:12px;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;text-align:center;color:var(--mu);transition:all .2s}
.ptab.on{background:var(--acc);color:#fff;border-color:var(--acc)}

/* LEARNED WORDS */
.lw-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--card2)}
.lw-badge{background:var(--ok-light);border:1.5px solid var(--ok);border-radius:99px;padding:3px 10px;font-size:12px;font-weight:800;color:var(--ok-dark)}

/* PRACTICE */
.pe{text-align:center;padding:48px 20px;color:var(--mu)}

/* POPUP */
.po{position:fixed;inset:0;background:var(--popup-bg);display:flex;align-items:center;justify-content:center;z-index:999;animation:fi .2s}
.pb2{background:var(--sur);border-radius:20px;padding:26px;width:290px;border:2px solid var(--border);text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.popt{font-size:18px;font-weight:900;margin-bottom:6px;color:var(--txt)}
.popu{font-size:13px;color:var(--mu);margin-bottom:20px;font-weight:600}

/* PHONICS */
.phc{background:var(--card);border-radius:14px;padding:16px;border-left:4px solid var(--acc);margin-bottom:10px;box-shadow:var(--shadow)}
.phs{font-size:20px;font-weight:900;color:var(--acc)}
.phl{font-size:15px;font-weight:800;color:var(--acc3);margin:4px 0}
.phe{font-size:13px;color:var(--mu);font-weight:600}

/* PROGRESS CARDS */
.prog-card{background:var(--sur);border-radius:var(--r);padding:18px;border:1.5px solid var(--border);box-shadow:var(--shadow);margin-bottom:10px;border-color:#4a4a4a}
.prog-title{font-size:11px;font-weight:800;letter-spacing:2px;color:var(--mu);text-transform:uppercase;margin-bottom:8px}
.prog-pct{font-size:28px;font-weight:900;color:var(--acc);margin-bottom:6px}

/* MINI PLAYER */
.mini-player{background:var(--sur2);border-radius:14px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:12px;border:1.5px solid var(--border)}
.mp-btn{background:var(--acc);border:none;border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:#fff}
.mp-bar{flex:1;height:5px;background:var(--mp-bar);border-radius:99px;cursor:pointer;position:relative}
.mp-fill{height:100%;background:var(--acc);border-radius:99px;transition:width .3s;pointer-events:none}
.mp-time{font-size:11px;font-weight:800;color:var(--mu);white-space:nowrap}

/* GENERATED TEXT */
.gen-card{background:var(--card);border-radius:var(--r);padding:20px;border:1.5px solid var(--border);box-shadow:var(--shadow);margin-top:12px;margin-bottom:14px}
.gen-gr{font-size:17px;font-weight:700;color:var(--txt);line-height:1.8;margin-bottom:14px}
.gen-ru{font-size:14px;color:var(--mu);line-height:1.7;font-weight:600;border-top:1.5px solid var(--border);padding-top:12px}
.gen-word{color:var(--acc);font-weight:800}
.gen-btn{width:100%;padding:14px 18px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--acc),#818cf8);
  color:#fff;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;
  box-shadow:var(--shadow);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.gen-loading{text-align:center;padding:30px;color:var(--mu);font-weight:700;font-size:15px}
@keyframes spin{to{transform:rotate(360deg)}}
.gen-spinner{display:inline-block;width:20px;height:20px;border:3px solid #e0e7ff;border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;margin-right:8px}

/* ANIMATIONS */
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.pop{animation:pop .3s cubic-bezier(.175,.885,.32,1.275)}

/* TOAST */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--acc);
  border-radius:99px;padding:10px 24px;font-size:14px;font-weight:800;
  color:#fff;z-index:1000;animation:fi .3s ease;white-space:nowrap;box-shadow:0 4px 20px rgba(79,70,229,.3)}

/* Dark mode card contrast */
.dark .card{border-color:#4a4a4a}
.dark .mi{border-color:#4a4a4a;color:var(--txt)}
.dark .cb2{border-color:#4a4a4a;color:var(--txt);background:var(--card)}
.dark .wi{border-color:#4a4a4a;color:var(--txt);background:var(--card)}
.dark .wi::placeholder{color:#6a6a6a}
.dark .bw{color:var(--txt)}
.dark .bwr{color:var(--acc)}

/* Dark mode — selected/matched states need stronger contrast */
.dark .cb2.ms{border-color:#f0b429 !important;background:rgba(240,180,41,.25) !important;color:#f0b429 !important;border-width:3px !important}
.dark .cb2.ck{border-color:var(--ok);background:rgba(240,180,41,.2);color:var(--ok);border-width:2.5px}
.dark .cb2.cw{border-color:var(--er);background:rgba(255,68,68,.2);color:#ff8888;border-width:2.5px}
.dark .mi.ms{border-color:#f0b429;background:rgba(240,180,41,.15);color:#f0b429;border-width:2.5px}
.dark .mi.mm{border-color:var(--ok);background:rgba(240,180,41,.25);color:var(--ok);border-width:2.5px;opacity:1}
.dark .mi.mw{border-color:var(--er);background:rgba(255,68,68,.2);border-width:2.5px}
.dark .fca{background:rgba(231,76,60,.2);border-color:var(--acc)}
.dark .fbok{background:rgba(240,180,41,.2);color:var(--ok)}
.dark .fber{background:rgba(255,68,68,.2);color:#ff8888}
.dark .wi.wok{background:rgba(240,180,41,.15);border-color:var(--ok)}
.dark .wi.wfl{background:rgba(255,68,68,.15);border-color:var(--er)}

/* Dark mode listen player */
.dark .listen-player-btn{background:var(--acc)}
.dark 
/* Dark mode nav active underline */
.dark .nt.on{color:var(--ok);border-bottom-color:var(--ok)}

/* ── ADAPTIVE UNIT (s1u0) ── */
.phase-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px 24px;text-align:center;min-height:300px}
.phase-icon{font-size:52px;margin-bottom:16px}
.phase-title{font-size:20px;font-weight:900;color:var(--acc);margin-bottom:10px}
.phase-sub{font-size:14px;font-weight:600;color:var(--mu);line-height:1.6;margin-bottom:24px}

/* Collapsed drag-drop */
.collapsed-card{background:var(--sur);border-radius:var(--r);padding:20px;border:1.5px solid var(--border);box-shadow:var(--shadow);margin-bottom:14px;text-align:center}
.collapsed-target{min-height:52px;background:var(--sur2);border:2px dashed var(--border);border-radius:12px;
  display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;
  padding:8px;margin:14px 0;font-size:20px;font-weight:900;color:var(--acc)}
.collapsed-target.has-content{border-style:solid;border-color:var(--acc);background:var(--acc-light)}
.syllable-pool{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:14px}
.syllable{padding:10px 16px;background:var(--card);border:2px solid var(--border);border-radius:10px;
  font-size:18px;font-weight:800;cursor:grab;user-select:none;transition:all .2s;color:var(--txt)}
.syllable:active{cursor:grabbing;transform:scale(1.05);border-color:var(--acc);background:var(--acc-light)}
.syllable.used{opacity:.3;cursor:default;pointer-events:none}
.syllable.dragging{opacity:.5;transform:scale(1.08);border-color:var(--acc)}
.collapsed-target.drag-over{border-color:var(--ok);background:rgba(16,185,129,.1)}

/* Progress info */
.prog-info{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--mu);
  padding:4px 0 8px;font-weight:700}
.prog-info-btn{background:var(--spk-bg);border:none;border-radius:50%;width:18px;height:18px;
  font-size:10px;font-weight:900;color:var(--acc);cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center}

</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
// ─── TTS ──────────────────────────────────────────────────
let greekVoice=null;
function loadVoice(){const v=speechSynthesis.getVoices();greekVoice=v.find(x=>x.lang==='el-GR')||v.find(x=>x.lang==='el')||v.find(x=>x.lang.startsWith('el'))||null;}
if(window.speechSynthesis){loadVoice();speechSynthesis.onvoiceschanged=loadVoice;}
// Remove all Cyrillic characters and cleanup for Greek TTS
const SKIP_EMOJI_SET=new Set(['🔵','📍','❌','✅','➕','↔️','❓','📗','📘','📙','🔤','👤','👥','💬','🚶']);

function hasRealEmoji(emoji){
  return emoji && !SKIP_EMOJI_SET.has(emoji) && emoji !== '';
}
function renderWordVisual(word, card){
  if(CUSTOM_IMGS[word.id]){
    const img=document.createElement('img');
    img.src=CUSTOM_IMGS[word.id];
    img.style.cssText='width:90px;height:90px;object-fit:contain;margin-bottom:8px';
    card.appendChild(img);
    return true;
  }
  if(hasRealEmoji(word.emoji)){
    const e=document.createElement('div');e.className='be';e.textContent=word.emoji;card.appendChild(e);
    return true;
  }
  return false;
}

// No pronunciation map - let Greek TTS handle it natively
// Single letter articles (η, ο) are spoken naturally by el-GR voice
function stripNonGreek(text){
  return text
    .replace(/[а-яёА-ЯЁ]+/g,'') // remove Cyrillic
    .replace(/_+/g,'')            // remove underscores
    .replace(/\([^)]*\)/g,'')   // remove parentheses content
    .replace(/→/g,'')             // remove arrows
    .replace(/—/g,'')             // remove dashes
    .replace(/\s+/g,' ')         // normalize spaces
    .trim();
}

// Pronunciation map for single letters/short words that TTS reads wrong


function prepareForTTS(text){
  if(!text)return '';
  const clean=stripNonGreek(text);
  if(!clean)return '';
  // Greek TTS reads single letters by name (η=ита, ο=омикрон)
  // Add a period after short words to force word-reading mode
  const trimmed=clean.trim();
  if(trimmed.length<=2){return trimmed+'.';}
  return clean;
}

function speak(text){
  if(!window.speechSynthesis)return;
  const clean=prepareForTTS(text);
  if(!clean)return;
  try{speechSynthesis.cancel();}catch(e){}
  try{
    const u=new SpeechSynthesisUtterance(clean);
    u.lang='el-GR';u.rate=0.82;u.pitch=1;
    if(greekVoice)u.voice=greekVoice;
    speechSynthesis.speak(u);
  }catch(e){console.warn('TTS:',e);}
}

function speakList(texts){
  if(!window.speechSynthesis)return;
  try{speechSynthesis.cancel();}catch(e){}
  texts.forEach((text,i)=>{
    const clean=stripNonGreek(text);
    if(!clean)return;
    const u=new SpeechSynthesisUtterance(pronounced);
    u.lang='el-GR';u.rate=0.75;u.pitch=1;
    if(greekVoice)u.voice=greekVoice;
    speechSynthesis.speak(u);
    if(i<texts.length-1){
      const pause=new SpeechSynthesisUtterance(' ');
      pause.lang='el-GR';pause.volume=0;pause.rate=0.1;
      speechSynthesis.speak(pause);
    }
  });
}

function unitTotalItems(uid) {
  // Use actual saved queue length if available (set when unit starts)
  const saved = LS.get('unitQueueLen_'+uid, 0);
  if(saved>0) return saved;
  // Fallback formula
  const unit = SECTIONS.flatMap(s=>s.units).find(u=>u.id===uid);
  if(!unit) return 0;
  const words = unit.words.length;
  const fills = FILL_EXERCISES.filter(f=>f.unitId===uid).length;
  const listenQs = LISTEN_EXERCISES.filter(l=>l.unitId===uid)
    .reduce((a,l)=>a+l.questions.length, 0);
  const theories = THEORY_CARDS.filter(t=>t.unitId===uid).length;
  return words * 2 + fills + listenQs + theories;
}

    const newScore = Math.round(oldScore * savedCount / current);
    LS.set('unitTotalItems_'+uid, current);
    return newScore;
  }
  return oldScore;
}

function unitProgress(uid){return S.unitScores[uid]||0;}

function sectionProgress(sec){
  const units=sec.units;

  if(!totalW)return 0;
  const weighted=units.reduce((a,u)=>{
    const pct=unitProgress(u.id)/100;
    return a+pct*u.words.length;
  },0);
  return Math.min(Math.round((weighted/totalW)*100),100);
}

function bookProgress(){

  },0);
  return Math.min(Math.round((weighted/totalW)*100),100);
}

// ─── BUILD EXERCISE ───────────────────────────────────────
function buildEx(word,pool,forceType){
  const others=pool.filter(w=>w.id!==word.id);
  const fb=ALL_WORDS.filter(w=>w.id!==word.id);
  const src=others.length>=3?others:fb;
  const types=["FC","C4","WRITE","MATCH"];
  const type=forceType||types[Math.floor(Math.random()*types.length)];
  if(type==="MATCH"){
    const pairs=shuffle([word,...pick(src,3)]).slice(0,4);
    return{type,word,pairs,ll:shuffle(pairs.map(p=>p.greek)),rl:shuffle(pairs.map(p=>p.ru))};
  }
  if(type==="FC")return{type,word,dir:Math.random()>.5?'grToRu':'ruToGr'};
  return{type,word,opts:shuffle([word,...pick(src,3)])};
}

// ─── PRACTICE WORDS (only checked, not learned) ───────────
function pracWords(){return ALL_WORDS.filter(w=>S.checked.has(w.id)&&!S.learned.has(w.id));}

function buildPEx(){
  const pw=pracWords(); // already excludes learned
  if(!pw.length){S.pEx=null;return;}
  const word=pw[Math.floor(Math.random()*pw.length)];
  const others=pw.filter(w=>w.id!==word.id);
  // MATCH if 2+ words available (min 2 pairs)
  const canMatch=pw.length>=2;
  const r=Math.random();
  if(!canMatch||r<0.5){
    S.pEx={t:'FC',word,dir:Math.random()>.5?'grToRu':'ruToGr'};S.pFcRev=false;
  } else {
    // MATCH with 2-4 pairs depending on how many practice words available
    const pairCount=Math.min(pw.length,4);
    const pairs=shuffle([word,...pick(others,pairCount-1)]).slice(0,pairCount);
    S.pEx={t:'MA',word,pairs,ll:shuffle(pairs.map(p=>p.greek)),rl:shuffle(pairs.map(p=>p.ru))};
    S.pMSelL=null;S.pMSelR=null;S.pMDone=[];S.pMWrong=[];
  }
}

// ─── GREEK SYLLABLE SPLITTER ──────────────────────────────
function splitGreekSyllables(word){
  const vowels='αεηιοωυάέήίόώύϊϋΐΰΑΕΗΙΟΩΥ';
  const isVowel=c=>vowels.includes(c);
  const letters=[...word];
  const n=letters.length;
  if(n===0)return[];

  // Mark vowel positions
  const vPos=letters.map(isVowel);

  // Find syllable break points
  // Rule: each syllable has exactly one vowel nucleus
  // Break before a consonant that starts a new syllable
  const breaks=[0];
  for(let i=1;i<n;i++){
    if(vPos[i]&&!vPos[i-1]){
      // consonant before vowel — potential break
      // look back to find where this consonant cluster starts
      let clusterStart=i-1;
      while(clusterStart>0&&!vPos[clusterStart-1])clusterStart--;
      // if cluster has 2+ consonants, split in the middle
      const clusterLen=i-clusterStart;
      if(clusterLen>=2){
        breaks.push(clusterStart+Math.floor(clusterLen/2));
      } else if(clusterStart>0){
        breaks.push(clusterStart);
      }
    }
  }

  // Build syllables from breaks
  const uniqueBreaks=[...new Set(breaks)].sort((a,b)=>a-b);
  const syllables=[];
  for(let i=0;i<uniqueBreaks.length;i++){
    const start=uniqueBreaks[i];
    const end=i+1<uniqueBreaks.length?uniqueBreaks[i+1]:n;
    const syl=letters.slice(start,end).join('');
    if(syl)syllables.push(syl);
  }

  // Filter empty, merge orphan consonants
  const result=syllables.filter(s=>s.length>0);
  if(result.length===0)return[word];
  return result;
}

// ─── ADAPTIVE UNIT HELPERS ───────────────────────────────
function isAdaptiveUnit(unit){return unit&&unit.id==='s1u0';}

function adaptGetWords(){
  return S.activeUnit?S.activeUnit.words:[];
}

function adaptCalcTotal(){
  const words=adaptGetWords();
  const nWords=words.length;
  const nUnknown=S.adaptUnknown.length;
  const nC4Wrong=S.adaptC4Wrong.length;
  const theories=THEORY_CARDS.filter(t=>t.unitId==='s1u0').length;
  const fills=FILL_EXERCISES.filter(f=>f.unitId==='s1u0').length;
  const listenQs=LISTEN_EXERCISES.filter(l=>l.unitId==='s1u0').reduce((a,l)=>a+l.questions.length,0);
  // theory + fc_intro(1) + fc(nWords) + c4(nUnknown) + collapsed(c4wrong) + summary_intro(1) + fill+listen
  let total=theories+1+nWords+nUnknown+nC4Wrong+1+fills+listenQs;
  return total;
}

function adaptCurrentWord(){
  const phase=S.adaptPhase;
  if(phase==='fc'){return adaptGetWords()[S.adaptWordIdx]||null;}
  if(phase==='c4'){
    const unknownWords=adaptGetWords().filter(w=>S.adaptUnknown.includes(w.id));
    return unknownWords[S.adaptWordIdx]||null;
  }
  if(phase==='collapsed'){
    const wrongWords=adaptGetWords().filter(w=>S.adaptC4Wrong.includes(w.id));
    return wrongWords[S.adaptWordIdx]||null;
  }
  return null;
}

function adaptBuildC4(word){
  const src=ALL_WORDS.filter(w=>w.id!==word.id);
  return shuffle([word,...pick(src,3)]);
}

function adaptNextPhase(){
  const words=adaptGetWords();
  S.adaptWordIdx=0;
  S.adaptAnswered=Math.min(S.adaptAnswered+1,adaptCalcTotal());
  if(S.adaptPhase==='theory'){
    // Theory handled by normal THEORY_SLOT flow; 
    // Phase switches after last theory card in renderAdaptiveEx
    S.adaptPhase='fc_intro';
  } else if(S.adaptPhase==='fc_intro'){
    S.adaptPhase='fc';
  } else if(S.adaptPhase==='fc'){
    if(S.adaptUnknown.length>0){S.adaptPhase='c4';}
    else{S.adaptPhase='summary_intro';}
  } else if(S.adaptPhase==='c4'){
    if(S.adaptC4Wrong.length>0){S.adaptPhase='collapsed';}
    else{S.adaptPhase='summary_intro';}
  } else if(S.adaptPhase==='collapsed'){
    S.adaptPhase='summary_intro';
  } else if(S.adaptPhase==='summary_intro'){
    S.adaptPhase='summary';
  }
}

function adaptInitCollapsed(word){
  const syls=splitGreekSyllables(word.greek);
  S.collSyllables=shuffle([...syls]);
  S.collPlaced=[];
  S.collCorrectSyls=syls; // correct order
}

function startAdaptiveUnit(unit){
  S.activeUnit=unit;
  // Try to restore saved progress
  const saved=LS.get('adaptState',null);
  if(saved&&saved.unitId===unit.id&&saved.phase&&saved.phase!=='theory'){
    S.adaptPhase=saved.phase;
    S.adaptUnknown=saved.unknown||[];
    S.adaptC4Wrong=saved.c4wrong||[];
    S.adaptCollWrong=saved.collwrong||[];
    S.adaptWordIdx=saved.wordIdx||0;
    S.adaptAnswered=saved.answered||0;
    S.answers=saved.answers||[];
    S.score=saved.score||{c:0,w:0,st:0};
    S.errs=[];
    // Rebuild queue for current phase
    if(saved.phase==='summary'){
      startAdaptiveSummary(true); // build queue but don't call nextEx yet
      S.qi=Math.min(saved.qi||0, Math.max(0,S.queue.length-1));
      nextEx(); // load the correct exercise
    }
    S.mode='unit';render();return;
  }
  S.adaptPhase='theory';
  S.adaptUnknown=[];
  S.adaptC4Wrong=[];
  S.adaptCollWrong=[];
  S.adaptWordIdx=0;
  S.adaptAnswered=0;
  S.answers=[];
  S.score={c:0,w:0,st:0};
  S.errs=[];
  const theories=THEORY_CARDS.filter(t=>t.unitId===unit.id);
  S.queue=theories.map(t=>({type:'THEORY_SLOT',theoryId:t.id}));
  S.qi=0;
  S.mode='unit';
  
  nextEx();render();
}

    const b=el('button',cls);b.textContent=o.ru;
    if(S._adaptC4Checked)b.disabled=true;
    b.onclick=()=>{if(S._adaptC4Checked)return;S._adaptC4Chosen=o.id;render();};
    chs.appendChild(b);
  });
  sc.appendChild(chs);

  if(S._adaptC4Chosen&&!S._adaptC4Checked){
    const chk=el('button','btn bpr bfw');chk.textContent='Проверить';
    chk.onclick=()=>{
      S._adaptC4Checked=true;
      const ok=S._adaptC4Chosen===word.id;
      S.answers.push(ok?'ok':'err');S.adaptAnswered++;
      if(!ok&&!S.adaptC4Wrong.includes(word.id))S.adaptC4Wrong.push(word.id);
      render();
    };
    sc.appendChild(chk);
  }
  if(S._adaptC4Checked){
    const ok=S._adaptC4Chosen===word.id;
    const fb=el('div','fb '+(ok?'fbok':'fber'));
    fb.textContent=ok?'✅ Верно!':'❌ Правильно: '+word.ru;
    sc.appendChild(fb);
    {
      const nb=el('button','btn bpr bfw');nb.textContent='Дальше →';nb.style.marginTop='8px';
      nb.onclick=()=>{
        S._adaptC4Opts=null;S._adaptC4Word=null;S._adaptC4Checked=false;S._adaptC4Chosen=null;
        if(isCollapsedFallback){
          S.adaptWordIdx++;
          const wrongWords=adaptGetWords().filter(w=>S.adaptC4Wrong.includes(w.id));
          if(S.adaptWordIdx>=wrongWords.length){adaptNextPhase();}
        } else {
          S.adaptWordIdx++;
          const unknownWords=adaptGetWords().filter(w=>S.adaptUnknown.includes(w.id));
          if(S.adaptWordIdx>=unknownWords.length){adaptNextPhase();}
        }
        render();
      };
      sc.appendChild(nb);
    }
  }
}

function renderAdaptCollapsed(sc,word){
  // Split into syllables; if word <=3 chars, split into individual letters
  const rawSyls=splitGreekSyllables(word.greek);
  const syls=(word.greek.length<=3)?[...word.greek]:rawSyls;

  // Init state if new word
  if(!S.collSyllables||S.collSyllables.length===0||S._collWord!==word.id){
    S._collWord=word.id;
    S.collSyllables=shuffle([...syls]);
    S.collPlaced=[];
    S.collCorrectSyls=syls;
    S._collChecked=false;
    S._collUserAnswer=null; // store user's attempt
  }

  const lbl=el('div','ex');lbl.textContent='СОСТАВЬ СЛОВО ПО СЛОГАМ';sc.appendChild(lbl);

  // Word card (Russian)
  const card=el('div','card cc');card.style.marginBottom='10px';
  renderWordVisual(word,card);
  const ru=el('div','bw bwr');ru.textContent=word.ru;card.appendChild(ru);
  sc.appendChild(card);

  // Target drop zone
  const isCorrect=S._collChecked&&S._collUserAnswer&&S._collUserAnswer.join('')===S.collCorrectSyls.join('');
  const target=el('div');
  target.id='coll-target';
  // No red border on drag — just dashed border, color changes only on check
  let targetStyle='min-height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;padding:10px;margin:14px 0;font-size:20px;font-weight:900;';
  if(S._collChecked){
    targetStyle+=isCorrect
      ?'background:var(--ok-light);border:2px solid var(--ok);color:var(--ok-dark);'
      :'background:var(--er-light);border:2px solid var(--er);color:var(--er);';
  } else {
    targetStyle+='background:var(--sur2);border:2px dashed var(--border);color:var(--acc);';
  }
  target.style.cssText=targetStyle;

  if(S._collChecked){
    // Show USER's answer, not the correct one
    const displayed=S._collUserAnswer||S.collPlaced;
    displayed.forEach(syl=>{
      const span=el('span');span.textContent=syl;target.appendChild(span);
    });
    // Show correct answer below if wrong
    if(!isCorrect){
      const hint=el('div');hint.style.cssText='font-size:13px;color:var(--ok-dark);background:var(--ok-light);border-radius:8px;padding:6px 12px;margin-top:8px;font-weight:700';
      hint.textContent='✅ Правильно: '+S.collCorrectSyls.join('');
      target.appendChild(hint);
    }
  } else {
    S.collPlaced.forEach((syl,i)=>{
      const span=el('span');
      span.style.cssText='cursor:pointer;padding:2px 6px;border-radius:6px;font-size:20px;font-weight:900;background:var(--acc-light);border:1px solid var(--acc);color:var(--acc)';
      span.textContent=syl;
      span.title='Нажми чтобы убрать';
      span.onclick=()=>{
        // Find first available slot for this syllable
        const origIdx=S.collSyllables.indexOf('__used_'+i);
        // Find any used slot to free
        for(let j=0;j<S.collSyllables.length;j++){
          if(S.collSyllables[j]==='__used_'+i){S.collSyllables[j]=syl;break;}
        }
        S.collPlaced.splice(i,1);
        // Re-index remaining used markers
        S.collSyllables=S.collSyllables.map((s,j)=>{
          if(typeof s==='string'&&s.startsWith('__used_')){
            const usedIdx=parseInt(s.replace('__used_',''));
            if(usedIdx>i)return '__used_'+(usedIdx-1);
          }
          return s;
        });
        render();
      };
      target.appendChild(span);
    });
    if(!S.collPlaced.length){
      const ph=el('span');ph.style.cssText='color:var(--mu);font-size:14px;font-weight:700';
      ph.textContent='Перетащи слоги сюда';target.appendChild(ph);
    }
  }

  // Drag over — NO red border, just subtle highlight
  target.ondragover=e=>{e.preventDefault();};
  target.ondragleave=()=>{};
  target.ondrop=e=>{
    e.preventDefault();
    const idx2=parseInt(e.dataTransfer.getData('text'));
    if(isNaN(idx2))return;
    const syl=S.collSyllables[idx2];
    if(syl&&!syl.startsWith('__used_')){
      S.collPlaced.push(syl);
      S.collSyllables[idx2]='__used_'+S.collPlaced.length-1;
      render();
    }
  };
  sc.appendChild(target);

  // Syllable pool
  if(!S._collChecked){
    const pool=el('div','syllable-pool');
    S.collSyllables.forEach((syl,i)=>{
      const isUsed=typeof syl==='string'&&syl.startsWith('__used_');
      const d=el('div','syllable'+(isUsed?' used':''));
      d.textContent=isUsed?'':syl;
      d.draggable=!isUsed;
      d.ondragstart=e=>{e.dataTransfer.setData('text',String(i));d.classList.add('dragging');};
      d.ondragend=()=>d.classList.remove('dragging');
      // Touch
      d.ontouchstart=e=>{
        if(isUsed)return;
        S._touchDragIdx=i;S._touchDragSyl=syl;
        d.classList.add('dragging');
      };
      d.ontouchend=e=>{
        d.classList.remove('dragging');
        const touch=e.changedTouches[0];
        const el2=document.elementFromPoint(touch.clientX,touch.clientY);
        if(el2&&(el2.id==='coll-target'||el2.closest('#coll-target'))){
          const dragSyl=S.collSyllables[S._touchDragIdx];
          if(dragSyl&&!dragSyl.startsWith('__used_')){
            S.collPlaced.push(dragSyl);
            S.collSyllables[S._touchDragIdx]='__used_'+(S.collPlaced.length-1);
            render();
          }
        }
        S._touchDragIdx=null;S._touchDragSyl=null;
      };
      pool.appendChild(d);
    });
    sc.appendChild(pool);

    // Check / Give up buttons
    const allPlaced=S.collPlaced.length===syls.length;
    if(allPlaced){
      const chk=el('button','btn bpr bfw');chk.textContent='Проверить';
      chk.onclick=()=>{
        S._collUserAnswer=[...S.collPlaced]; // save user answer before anything
        S._collChecked=true;
        const ok=S.collPlaced.join('')===S.collCorrectSyls.join('');
        S.answers.push(ok?'ok':'err');S.adaptAnswered++;
        if(!ok&&!S.adaptCollWrong.includes(word.id))S.adaptCollWrong.push(word.id);
        render();
        if(ok){setTimeout(()=>adaptCollNext(),1200);}
      };
      sc.appendChild(chk);
    }

    const giveup=el('button','btn bot bfw');giveup.style.marginTop='8px';
    giveup.textContent='🏳️ Сдаюсь';
    giveup.onclick=()=>{
      S._collUserAnswer=[...S.collPlaced]; // save whatever was placed
      // Fill remaining slots with correct syllables to show what's missing
      S.collPlaced=[...S.collCorrectSyls];
      S._collChecked=true;
      S.answers.push('err');S.adaptAnswered++;
      if(!S.adaptCollWrong.includes(word.id))S.adaptCollWrong.push(word.id);
      render();
    };
    sc.appendChild(giveup);
  } else {
    // Checked — show Next button
    const ok=isCorrect;
    const fb=el('div','fb '+(ok?'fbok':'fber'));
    fb.textContent=ok?'✅ Верно! '+word.greek:'❌ Неверно';
    sc.appendChild(fb);
    const nb=el('button','btn bpr bfw');nb.textContent='Дальше →';
    nb.onclick=()=>adaptCollNext();sc.appendChild(nb);
  }

}

function adaptCollNext(){
  S._collChecked=false;S._collWord=null;S.collPlaced=[];S.collSyllables=[];
  S.adaptWordIdx++;
  const wrongWords=adaptGetWords().filter(w=>S.adaptC4Wrong.includes(w.id));
  if(S.adaptWordIdx>=wrongWords.length){adaptNextPhase();}
  render();
}

function startAdaptiveSummary(skipNextEx){
  // Build summary queue: fill + listen
  const fills=FILL_EXERCISES.filter(f=>f.unitId==='s1u0');
  const listens=LISTEN_EXERCISES.filter(l=>l.unitId==='s1u0');
  const queue=[];
  fills.forEach(f=>queue.push({type:'FILL_SLOT',fillId:f.id}));
  listens.forEach(l=>l.questions.forEach((_,qIdx)=>queue.push({type:'LISTEN_SLOT',listenId:l.id,qIdx})));
  S.queue=queue;S.qi=0;
  if(!skipNextEx)nextEx();
}

function startUnit(unit){
  if(isAdaptiveUnit(unit)){startAdaptiveUnit(unit);return;}
  const sess=LS.get('session',null);
  if(sess&&sess.unitId===unit.id&&sess.qi<sess.queue.length){
    S.activeUnit=unit;
    // Restore mixed queue (words + fill slots)
    S.queue=sess.queue.map(item=>{
      if(!item)return null;
      if(item.type==='FILL_SLOT'||item.type==='LISTEN_SLOT'||item.type==='THEORY_SLOT')return item;
      if(item.type&&['FC','C4','WRITE','MATCH'].includes(item.type))return item;
      return ALL_WORDS.find(w=>w.id===item);
    }).filter(Boolean);
    S.qi=sess.qi;
    S.score=sess.score||{c:0,w:0,st:0};
    S.errs=sess.errs||[];
    S.answers=sess.answers||[];
  } else {
    S.activeUnit=unit;
    // Build mixed queue: theory first, then words + fill + listen
    const wordQueue=shuffle(unit.words);
    const fills=FILL_EXERCISES.filter(f=>f.unitId===unit.id);
    const listens=LISTEN_EXERCISES.filter(l=>l.unitId===unit.id);
    const theories=THEORY_CARDS.filter(t=>t.unitId===unit.id);

    let mixed=[];
    // Theory cards always go first
    theories.forEach(t=>mixed.push({type:'THEORY_SLOT',theoryId:t.id}));

    // Build word exercises ensuring all MATCH words get a second exercise
    const usedInMatch=new Set();
    const wordExercises=[];

    // First pass: assign exercise types
    wordQueue.forEach(word=>{
      if(!word||!word.id||!word.greek||!word.ru){return;} // skip invalid words
      const others=wordQueue.filter(w=>w&&w.id!==word.id);
      const fb=ALL_WORDS.filter(w=>w&&w.id!==word.id);
      const src=others.length>=3?others:fb;
      const types=['FC','C4','WRITE','MATCH'];
      const type=types[Math.floor(Math.random()*types.length)];
      if(type==='MATCH'){
        const pairs=shuffle([word,...pick(src,3)]).slice(0,4);
        wordExercises.push({type,word,pairs,ll:shuffle(pairs.map(p=>p.greek)),rl:shuffle(pairs.map(p=>p.ru))});
        pairs.forEach(p=>usedInMatch.add(p.id));
      } else if(type==='FC'){
        wordExercises.push({type,word,dir:Math.random()>.5?'grToRu':'ruToGr'});
      } else if(type==='WRITE'){
        wordExercises.push({type,word,dir:Math.random()>.5?'grToRu':'ruToGr'});
      } else {
        wordExercises.push({type,word,opts:shuffle([word,...pick(src,3)])});
      }
    });

    // Second pass: ALL words get a second exercise (no MATCH, only FC/C4/WRITE)
    const extraTypes=['FC','C4','WRITE'];
    const extraExercises=[];
    wordQueue.forEach(word=>{
      if(!word||!word.id||!word.greek||!word.ru){return;} // skip invalid
      const others=wordQueue.filter(w=>w&&w.id!==word.id);
      const fb=ALL_WORDS.filter(w=>w.id!==word.id);
      const src=others.length>=3?others:fb;
      const type=extraTypes[Math.floor(Math.random()*extraTypes.length)];
      if(type==='FC'){
        extraExercises.push({type,word,dir:Math.random()>.5?'grToRu':'ruToGr'});
      } else if(type==='WRITE'){
        extraExercises.push({type,word,dir:Math.random()>.5?'grToRu':'ruToGr'});
      } else {
        extraExercises.push({type,word,opts:shuffle([word,...pick(src,3)])});
      }
    });

    // Shuffle extra exercises and spread them after halfway point
    const shuffledExtra=shuffle(extraExercises);
    mixed=[...mixed,...wordExercises];
    // Insert extras in second half
    const halfway=mixed.length;
    shuffledExtra.forEach((ex,i)=>{
      const pos=halfway+Math.floor(i*shuffledExtra.length/(shuffledExtra.length+1));
      mixed.splice(Math.min(pos,mixed.length),0,ex);
    });

    // Insert fill exercises at intervals
    const theoryCount=theories.length;
    fills.forEach((f,i)=>{
      const pos=Math.min(theoryCount+Math.floor((i+1)*(wordQueue.length)/(fills.length+1)),mixed.length);
      mixed.splice(pos,0,{type:'FILL_SLOT',fillId:f.id});
    });

    // Listen at end - one slot per question
    listens.forEach(l=>{
      l.questions.forEach((_,qIdx)=>{
        mixed.push({type:'LISTEN_SLOT',listenId:l.id,qIdx});
      });
    });
    S.queue=mixed;S.qi=0;
    LS.set('unitQueueLen_'+unit.id, mixed.length);
    S.score={c:0,w:0,st:0};S.errs=[];S.answers=[];
    // Save actual queue length so home screen shows same number
    LS.set('unitQueueLen_'+unit.id, mixed.length);
    S.unitQueueLens=S.unitQueueLens||{};
    S.unitQueueLens[unit.id]=mixed.length;
  }
  S.lastActiveUnitId=S.activeUnit?.id;LS.set('lastActiveUnitId',S.lastActiveUnitId);S.mode='unit';nextEx();render();
}

function prevEx(){
  if(S.qi<=0)return;
  S.qi--;
  const item=S.queue[S.qi];
  if(item&&item.type==='THEORY_SLOT'){
    const t=THEORY_CARDS.find(x=>x.id===item.theoryId);
    if(t){S.ex={type:'THEORY',theory:t};}
    else{S.qi--;prevEx();return;}
  } else if(item&&item.type==='FILL_SLOT'){
    const f=FILL_EXERCISES.find(x=>x.id===item.fillId);
    if(f){S.ex={type:'FILL',fillId:f.id,sentence:f.sentence,hint:f.hint,answer:f.answer,options:shuffle(f.options),translation:f.translation,emoji:f.emoji};}
    else{S.qi--;prevEx();return;}
  } else if(item&&item.type==='LISTEN_SLOT'){
    const l=LISTEN_EXERCISES.find(x=>x.id===item.listenId);
    if(l){S.ex={type:'LISTEN',listenId:l.id,listen:l,qIdx:0};}
    else{S.qi--;prevEx();return;}
  } else if(item&&item.type&&['FC','C4','WRITE','MATCH'].includes(item.type)){
    S.ex=item; // pre-built exercise
  } else if(item&&item.id){
    S.ex=buildEx(item,S.queue.filter(x=>x&&!x.type&&x.id));
  } else {
    // unknown item - skip
    if(S.qi>0){S.qi--;prevEx();}
    return;
  }
  S.fcRev=false;S.chosen=null;S.c4checked=false;S.fillChosen=null;S.fillChecked=false;
  S.listenChosen=null;S.listenChecked=false;
  S.mSelGr=null;S.mSelRu=null;S.mDone=[];S.mWrong=[];S.mDoneAll=false;S.mWrongCount=0;
  // Undo last score change
  if(S.answers&&S.answers.length>0){
    const last=S.answers.pop();
    if(last==='ok'||last==='theory')S.score.c=Math.max(0,S.score.c-1);
    else S.score.w=Math.max(0,S.score.w-1);
  }
  save();render();
}

function nextEx(){
  if(S.qi>=S.queue.length)return;
  const item=S.queue[S.qi];
  // If item is a pre-built exercise (from retry), use it directly
  if(item&&item.type&&['FC','C4','WRITE','MATCH','FILL','LISTEN'].includes(item.type)){
    S.ex=item;
    S.fcRev=false;S.chosen=null;S.c4checked=false;
    S.fillChosen=null;S.fillChecked=false;
    S.listenChosen=null;S.listenChecked=false;
    S.mSelGr=null;S.mSelRu=null;S.mDone=[];S.mWrong=[];S.mDoneAll=false;S.mWrongCount=0;
    S.wv='';S.ws=null;
    return;
  }
  if(item&&item.type==='THEORY_SLOT'){
    const t=THEORY_CARDS.find(x=>x.id===item.theoryId);
    if(t){S.ex={type:'THEORY',theory:t};}
    else{S.qi++;nextEx();return;}
  } else if(item&&item.type==='FILL_SLOT'){
    const f=FILL_EXERCISES.find(x=>x.id===item.fillId);
    if(f){
      S.ex={type:'FILL',fillId:f.id,sentence:f.sentence,hint:f.hint,
        answer:f.answer,options:shuffle(f.options),translation:f.translation,emoji:f.emoji};
    } else { S.qi++; nextEx(); return; }
  } else if(item&&item.type==='LISTEN_SLOT'){
    const l=LISTEN_EXERCISES.find(x=>x.id===item.listenId);
    if(l){
      S.listenQIdx=item.qIdx||0;
      S.ex={type:'LISTEN',listenId:l.id,listen:l,qIdx:S.listenQIdx};
    } else { S.qi++; nextEx(); return; }
  } else if(item&&item.type&&['FC','C4','WRITE','MATCH'].includes(item.type)){
    // Pre-built exercise
    S.ex=item;
  } else {
    const word=item;
    if(word&&word.id){
      S.ex=buildEx(word,S.queue.filter(x=>x&&x.id&&!['FILL_SLOT','LISTEN_SLOT','THEORY_SLOT'].includes(x.type)));
    }
  }
  S.fcRev=false;S.chosen=null;S.c4checked=false;S.fillChosen=null;S.fillChecked=false;S.listenChosen=null;S.listenChecked=false;
  S.wv='';S.ws=null;
  S.mSelGr=null;S.mSelRu=null;S.mDone=[];S.mWrong=[];S.mDoneAll=false;S.mWrongCount=0;
}

function advance(ok){
  S.score.c+=ok?1:0;S.score.w+=ok?0:1;S.score.st=ok?S.score.st+1:0;
  if(!S.answers)S.answers=[];
  S.answers.push(ok?'ok':'err');
  if(!ok){
    // Save the full exercise object so we can replay it exactly
    if(S.ex) S.errs.push({...S.ex});
    // Also add word to checked for practice
    if(S.ex?.word && !S.checked.has(S.ex.word.id)){
      S.checked.add(S.ex.word.id);
    }
  }
  S.qi++;
  save();
  if(S.qi<S.queue.length){nextEx();render();}
  else{
    const pct=Math.round((S.score.c/(S.score.c+S.score.w||1))*100);
    S.unitScores[S.activeUnit.id]=pct;
    // Save current total items count for future recalc
    LS.set('unitTotalItems_'+S.activeUnit.id, unitTotalItems(S.activeUnit.id));
    // Save errors for retry button on home screen
    if(S.errs.length>0){
      LS.set('unitErrs_'+S.activeUnit.id, S.errs.map(w=>w.id));
    } else {
      LS.set('unitErrs_'+S.activeUnit.id, []);
    }
    LS.set('session',null);
    save();render();
  }
}

    // Text card with play button

    // Audio player - icon only, no text
    const playerWrap=el('div');
    playerWrap.style.cssText='margin-bottom:14px;position:relative;border-radius:14px;overflow:hidden;background:var(--mp-bg);border:2px solid var(--acc);cursor:pointer;user-select:none;height:64px;touch-action:none';
    const playerFill=el('div');

    const playerIcon=el('div');
    playerIcon.style.cssText='position:absolute;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff';

    playerWrap.appendChild(playerFill);
    playerWrap.appendChild(playerIcon);

    // Split text into words for scrubbing
    const textWords=l.text.split(/\s+/).filter(w=>w.length>0);
    const totalWords=textWords.length;

    let isPlaying=false;
    let progressInterval=null;
    let scrubPct=0; // 0-1, current position
    let startTime=null;

    // Duration estimate per word
    const wordDur=500; // ~500ms per word at rate 0.82
    const totalDur=totalWords*wordDur;

    function speakFrom(pct){
      try{speechSynthesis.cancel();}catch(e){}
      if(l.dialogue&&pct<0.05){
        // Speak dialogue with different pitch per speaker
        function speakSegments(segments){
          if(!segments.length)return onEnd();
          const seg=segments[0];
          const rest=segments.slice(1);
          const u=new SpeechSynthesisUtterance(seg.text);
          u.lang='el-GR';u.rate=seg.rate||0.82;u.pitch=seg.pitch||1;
          if(greekVoice)u.voice=greekVoice;
          u.onend=()=>speakSegments(rest);
          try{speechSynthesis.speak(u);}catch(e){}
        }
        speakSegments(l.dialogue);
        return;
      }
      // Fallback: speak from position
      const wordIdx=Math.floor(pct*totalWords);
      const partial=textWords.slice(wordIdx).join(' ');
      if(!partial)return onEnd();
      const u=new SpeechSynthesisUtterance(partial);
      u.lang='el-GR';u.rate=0.82;u.pitch=1;
      if(greekVoice)u.voice=greekVoice;
      u.onend=()=>onEnd();
      try{speechSynthesis.speak(u);}catch(e){}
    }

    function refreshIcon(){
      const pct=parseFloat(playerFill.style.width)||0;
      playerIcon.style.color='#fff';
    }

    function startProgress(){
      // Time remaining = (1 - scrubPct) * totalDur
      const remaining=(1-scrubPct)*totalDur;
      startTime=Date.now();
      progressInterval=setInterval(()=>{
        const elapsed=Date.now()-startTime;
        const newPct=Math.min(1, scrubPct + elapsed/totalDur);
        playerFill.style.width=(newPct*100)+'%';
        refreshIcon();
        if(newPct>=1){clearInterval(progressInterval);onEnd();}
      },50);
    }

    function stopProgress(){clearInterval(progressInterval);}

    function onEnd(){
      isPlaying=false;scrubPct=0;
      stopProgress(); // make sure interval is cleared
      playerFill.style.width='0%';
      playerIcon.style.opacity='1';
      playerIcon.textContent='▶';refreshIcon();
    }

    let isDragging=false;
    let dragStartX=0;

    playerWrap.addEventListener('touchstart',e=>{
      dragStartX=e.touches[0].clientX;
      isDragging=false;
    },{passive:true});

    playerWrap.addEventListener('touchmove',e=>{
      if(Math.abs(e.touches[0].clientX-dragStartX)>5){
        if(!isDragging){
          isDragging=true;
          playerIcon.style.opacity='0'; // hide icon while scrubbing
          stopProgress();
          speechSynthesis.cancel();
        }
        const rect=playerWrap.getBoundingClientRect();
        scrubPct=Math.max(0,Math.min(1,(e.touches[0].clientX-rect.left)/rect.width));
        playerFill.style.width=(scrubPct*100)+'%';
      }
    },{passive:true});

    playerWrap.addEventListener('touchend',e=>{
      if(isDragging){
        isDragging=false;
        playerIcon.style.opacity='1';
        // Resume from scrubbed position
        playerIcon.textContent='⏸';refreshIcon();
        isPlaying=true;
        speakFrom(scrubPct);
        startProgress();
      }
    },{passive:true});

    playerWrap.addEventListener('click',e=>{
      if(isDragging)return;
      if(!isPlaying){
        isPlaying=true;
        playerIcon.textContent='⏸';refreshIcon();
        speakFrom(scrubPct);
        startProgress();
      } else {
        isPlaying=false;
        scrubPct=parseFloat(playerFill.style.width)/100||0;
        playerIcon.textContent='▶';refreshIcon();
        speechSynthesis.cancel();
        stopProgress();
      }
    });

    refreshIcon();
    card.appendChild(playerWrap);

    // Show text (collapsible)
    const showTxt=el('div');showTxt.style.cssText='font-size:12px;color:var(--acc);cursor:pointer;font-weight:700;text-decoration:underline;margin-bottom:8px';
    showTxt.textContent='Показать текст';
    const txtBlock=el('div');txtBlock.style.cssText='font-size:14px;line-height:1.9;color:var(--txt);display:none;background:var(--sur2);border-radius:10px;padding:14px;margin-bottom:8px';
    (l.dialogue||[{speaker:'',text:l.text}]).forEach(seg=>{
      const p=el('div');p.style.cssText='margin-bottom:10px';
      if(seg.speaker){
        const name=el('span');
        name.style.cssText='font-weight:900;color:var(--acc);margin-right:6px';

      else{txtBlock.style.display='none';showTxt.textContent='Показать текст';}

    card.appendChild(showTxt);card.appendChild(txtBlock);

    // Translation toggle
    const showRu=el('div');showRu.style.cssText='font-size:12px;color:var(--mu);cursor:pointer;font-weight:700;text-decoration:underline';
    showRu.textContent='Показать перевод';
    const ruBlock=el('div');ruBlock.style.cssText='font-size:13px;line-height:1.7;color:var(--mu);display:none;margin-top:6px';
    ruBlock.textContent=l.textRu;
    showRu.onclick=()=>{
      if(ruBlock.style.display==='none'){ruBlock.style.display='block';showRu.textContent='Скрыть перевод';}
      else{ruBlock.style.display='none';showRu.textContent='Показать перевод';}
    };
    card.appendChild(showRu);card.appendChild(ruBlock);
    ew.appendChild(card);

    // Question
    const qCard=el('div','card');qCard.style.marginTop='4px';
    const qNum=el('div');qNum.style.cssText='font-size:11px;color:var(--mu);font-weight:800;margin-bottom:6px';
    qNum.textContent='Вопрос '+(qIdx+1)+' из '+l.questions.length;qCard.appendChild(qNum);
    const qRow=el('div');qRow.style.cssText='display:flex;align-items:flex-start;gap:8px';
    const qText=el('div');qText.style.cssText='font-size:16px;font-weight:800;margin-bottom:4px;flex:1';
    qText.textContent=q.q;qRow.appendChild(qText);
    const qSpk=el('button','spk');qSpk.textContent='🔊';qSpk.style.flexShrink='0';
    qSpk.onclick=e=>{e.stopPropagation();speak(q.q);};
    qRow.appendChild(qSpk);
    qCard.appendChild(qRow);
    const qRu=el('div');qRu.style.cssText='font-size:13px;color:var(--mu);font-weight:600';
    qRu.textContent=q.qRu;qCard.appendChild(qRu);
    ew.appendChild(qCard);

    // Options
    const chs=el('div','chs');
    q.options.forEach(opt=>{
      let cls='cb2';
      if(S.listenChecked){if(opt===q.answer)cls+=' ck';else if(opt===S.listenChosen)cls+=' cw';}
      else if(S.listenChosen===opt)cls+=' ms';
      const b=el('button',cls);b.textContent=opt;
      if(S.listenChecked)b.disabled=true;
      b.onclick=()=>{if(S.listenChecked)return;S.listenChosen=opt;speak(opt);render();};
      chs.appendChild(b);
    });
    ew.appendChild(chs);

    if(!S.listenChecked){
      if(S.listenChosen){
        const chk=el('button','btn bpr bfw');chk.textContent='Проверить';
        chk.onclick=()=>{S.listenChecked=true;render();};ew.appendChild(chk);
      }
    } else {
      const isOk=S.listenChosen===q.answer;
      const fb=el('div','fb '+(isOk?'fbok':'fber'));
      fb.textContent=isOk?'✅ Верно!':'❌ Правильно: '+q.answer;ew.appendChild(fb);
      const nb=el('button','btn bpr bfw');
      if(!isLast){
        nb.textContent='Следующий вопрос →';
        nb.onclick=()=>{
          S.listenChecked=false;S.listenChosen=null;
          advance(isOk);
        };
      } else {
        nb.textContent='Дальше →';
        nb.onclick=()=>{S.listenChecked=false;S.listenChosen=null;advance(isOk);};
      }
      ew.appendChild(nb);
    }
  }

  else if(type==='FILL'){
    const lbl=el('div','ex');lbl.textContent='Заполни пропуск';ew.appendChild(lbl);
    const card=el('div','card');
    // Show sentence
    const sentRow=el('div');sentRow.style.cssText='display:flex;align-items:flex-start;gap:10px;margin-bottom:10px';
    const sent=el('div');sent.style.cssText='font-size:18px;font-weight:800;line-height:1.6;color:var(--txt);flex:1';
    sent.textContent=S.ex.sentence;
    const sentSpk=el('button','spk');sentSpk.textContent='🔊';sentSpk.style.flexShrink='0';sentSpk.style.marginTop='4px';
    sentSpk.onclick=()=>{
      // Split answer by ' / ' to fill each blank separately
      const parts=S.ex.answer.split(/\s*\/\s*/);
      let idx=0;
      const full=S.ex.sentence.replace(/_{3,}/g, ()=>parts[idx++]||parts[parts.length-1]);
      speak(full);
    };
    sentRow.appendChild(sent);sentRow.appendChild(sentSpk);card.appendChild(sentRow);
    // Translation hint
    const tr=el('div');tr.style.cssText='font-size:13px;color:var(--mu);font-weight:600;margin-bottom:8px';
    // Show full translation - replace ___ with underline placeholder
    const translationFull = S.ex.translation.replace(/_{3,}/g,'_____');
    tr.textContent=translationFull;card.appendChild(tr);

    ew.appendChild(card);
    // Options
    const chs=el('div','chs');
    S.ex.options.forEach(opt=>{
      let cls='cb2';
      if(S.fillChecked){
        if(opt===S.ex.answer)cls+=' ck';
        else if(opt===S.fillChosen&&opt!==S.ex.answer)cls+=' cw';
      } else if(S.fillChosen===opt) cls+=' ms';
      const b=el('button',cls);b.textContent=opt;
      if(S.fillChecked)b.disabled=true;
      b.onclick=()=>{
        if(S.fillChecked)return;
        S.fillChosen=opt;
        render();
        setTimeout(()=>speak(opt),50);
      };
      chs.appendChild(b);
    });
    ew.appendChild(chs);
    if(!S.fillChecked){
      if(S.fillChosen){
        const chk=el('button','btn bpr bfw');chk.textContent='Проверить';
        chk.onclick=()=>{S.fillChecked=true;render();};ew.appendChild(chk);
      }
    } else {
      const isOk=S.fillChosen===S.ex.answer;
      const fb=el('div','fb '+(isOk?'fbok':'fber'));
      fb.textContent=isOk?'✅ Верно!':'❌ Неверно';
      ew.appendChild(fb);
      // Always show full correct sentence
      const corrParts=S.ex.answer.split(/\s*\/\s*/);
      let corrIdx=0;
      const corrSent=S.ex.sentence.replace(/_{3,}/g,()=>corrParts[corrIdx++]||corrParts[corrParts.length-1]);
      const sentBox=el('div');
      sentBox.style.cssText='background:var(--ok-light);border:1.5px solid var(--ok);border-radius:12px;padding:12px 14px;margin-top:6px;font-size:15px;font-weight:700;color:var(--ok-dark);display:flex;align-items:center;gap:10px';
      const sentText=el('span');sentText.style.flex='1';sentText.textContent=corrSent;
      const sentSpk=el('button','spk');sentSpk.textContent='🔊';
      sentSpk.onclick=()=>speak(corrSent);
      sentBox.appendChild(sentText);sentBox.appendChild(sentSpk);
      ew.appendChild(sentBox);
      const nb=el('button','btn bpr bfw');nb.textContent='Дальше →';
      nb.onclick=()=>{S.fillChecked=false;S.fillChosen=null;advance(isOk);};
      ew.appendChild(nb);
    }
  }

  return ew;
}

function doWrite(){
  if(!S.wv.trim())return;
  const ok=S.wv.trim().toLowerCase()===S.ex.word.greek.toLowerCase();
  S.ws=ok?'ok':'fl';render();setTimeout(()=>advance(ok),1300);
}

function handleMGr(gr){
  if(S.mDone.includes(gr))return;
  // Deselect if already selected
  if(S.mSelGr===gr){S.mSelGr=null;render();return;}
  if(S.mSelRu){
    const pair=S.ex.pairs.find(p=>p.greek===gr);
    if(pair&&pair.ru===S.mSelRu){S.mDone=[...S.mDone,gr];S.mSelGr=null;S.mSelRu=null;if(S.mDone.length===S.ex.pairs.length)S.mDoneAll=true;}
    else{S.mWrongCount=(S.mWrongCount||0)+1;S.mWrong=[gr,S.mSelRu];setTimeout(()=>{S.mWrong=[];S.mSelGr=null;S.mSelRu=null;render();},700);}
  }else S.mSelGr=gr;render();
}
function handleMRu(ru){
  const pGr=S.ex.pairs.find(p=>p.ru===ru)?.greek;if(S.mDone.includes(pGr))return;
  // Deselect if already selected
  if(S.mSelRu===ru){S.mSelRu=null;render();return;}
  if(S.mSelGr){
    const pair=S.ex.pairs.find(p=>p.greek===S.mSelGr);
    if(pair&&pair.ru===ru){S.mDone=[...S.mDone,S.mSelGr];S.mSelGr=null;S.mSelRu=null;if(S.mDone.length===S.ex.pairs.length)S.mDoneAll=true;}
    else{S.mWrongCount=(S.mWrongCount||0)+1;S.mWrong=[S.mSelGr,ru];setTimeout(()=>{S.mWrong=[];S.mSelGr=null;S.mSelRu=null;render();},700);}
  }else S.mSelRu=ru;render();
}

// ─── WORDS ────────────────────────────────────────────────
function renderWords(){
  const sc=el('div','sc');
  // Section tabs
  const stabs=el('div');stabs.style.cssText='display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px';
  const secIds=['all',...SECTIONS.map(s=>s.id)];
  const secLabels=['Все',...SECTIONS.map(s=>s.subtitle||s.title)];
  secIds.forEach((sid,i)=>{
    const tb=el('button','ptab'+(S.wlSection===sid||(!S.wlSection&&sid==='all')?' on':''));
    tb.textContent=secLabels[i];tb.style.whiteSpace='nowrap';
    tb.onclick=()=>{S.wlSection=sid;S.wlPage=0;render();};
    stabs.appendChild(tb);
  });
  sc.appendChild(stabs);
  const secWords=(!S.wlSection||S.wlSection==='all')?ALL_WORDS:ALL_WORDS.filter(w=>{
    const sec=SECTIONS.find(s=>s.units.some(u=>u.words.some(uw=>uw.id===w.id)));
    return sec&&sec.id===S.wlSection;
  });
  const q=S.wlSearch.toLowerCase();
  const filtered=secWords.filter(w=>!q||w.greek.toLowerCase().includes(q)||w.ru.toLowerCase().includes(q));
  const totalPages=Math.ceil(filtered.length/PER_PAGE);
  if(S.wlPage>=totalPages)S.wlPage=0;
  const pageWords=filtered.slice(S.wlPage*PER_PAGE,(S.wlPage+1)*PER_PAGE);
  const allCk=pageWords.length>0&&pageWords.every(w=>S.checked.has(w.id));

  const wlt=el('div','wlt');
  const inp=el('input','wls');inp.placeholder='Поиск...';inp.value=S.wlSearch;inp.dataset.persist='wl-search';
  inp.oninput=e=>{S.wlSearch=e.target.value;S.wlPage=0;render();};
  wlt.appendChild(inp);
  const eb=el('button','wleb');eb.textContent='↓ Конец';
  eb.onclick=()=>document.getElementById('wl-end')?.scrollIntoView({behavior:'smooth'});
  wlt.appendChild(eb);sc.appendChild(wlt);

  const sar=el('div','sar');
  const cb=el('input');cb.type='checkbox';cb.className='cb3';cb.checked=allCk;
  cb.onchange=()=>{const ids=pageWords.map(w=>w.id);ids.forEach(id=>allCk?S.checked.delete(id):S.checked.add(id));save();render();};
  sar.appendChild(cb);
  const sal=el('span');sal.textContent='Выбрать все на стр.';sar.appendChild(sal);
  const sc2=el('span');sc2.style.cssText='margin-left:auto;color:var(--acc);font-weight:800';
  sc2.textContent=`⚡ ${S.checked.size} в практике`;sar.appendChild(sc2);
  sc.appendChild(sar);

  const groups={};
  pageWords.forEach(w=>{(groups[w.cat]=groups[w.cat]||[]).push(w);});
  Object.entries(groups).forEach(([cat,words])=>{
    const cl=el('div','cl');cl.textContent=`${cat} (${words.length})`;sc.appendChild(cl);
    words.forEach(w=>{
      const wr=el('div','wr');
      const wc=el('input');wc.type='checkbox';wc.className='cb3';wc.checked=S.checked.has(w.id);
      wc.onchange=()=>{S.checked.has(w.id)?S.checked.delete(w.id):S.checked.add(w.id);save();render();};
      const we=el('div','we');we.textContent=w.emoji;
      const wg=el('div','wg');wg.textContent=w.greek;
      const wru=el('div','wru');wru.textContent=w.ru;
      const wsp=el('button','wsp');wsp.textContent='🔊';wsp.onclick=()=>speak(w.greek);
      wr.appendChild(wc);wr.appendChild(we);wr.appendChild(wg);wr.appendChild(wru);wr.appendChild(wsp);
      sc.appendChild(wr);
    });
  });

  const endDiv=el('div');endDiv.id='wl-end';sc.appendChild(endDiv);
  if(totalPages>1){
    const pn=el('div','pn');
    for(let i=0;i<totalPages;i++){
      const pb=el('button','pgb'+(S.wlPage===i?' pa':''));pb.textContent=i+1;
      pb.onclick=(()=>{const p=i;return()=>{S.wlPage=p;save();render();}; })();
      pn.appendChild(pb);
    }
    sc.appendChild(pn);
  }
  return sc;
}

    card.ontouchend=()=>clearTimeout(lpTimer);

      mg.appendChild(d);

  return wrap;

function handlePL(gr){
  if(S.pMDone.includes(gr))return;
  if(S.pMSelL===gr){S.pMSelL=null;render();return;}
  if(S.pMSelR){
    const pair=S.pEx.pairs.find(p=>p.greek===gr);
    if(pair&&pair.ru===S.pMSelR){
      S.pMDone=[...S.pMDone,gr];S.pMSelL=null;S.pMSelR=null;
      if(S.pMDone.length===S.pEx.pairs.length)setTimeout(()=>{buildPEx();render();},600);
    }else{S.pMWrong=[gr,S.pMSelR];setTimeout(()=>{S.pMWrong=[];S.pMSelL=null;S.pMSelR=null;render();},700);}
  }else S.pMSelL=gr;render();
}
function handlePR(ru){
  const pGr=S.pEx.pairs.find(p=>p.ru===ru)?.greek;if(S.pMDone.includes(pGr))return;
  if(S.pMSelR===ru){S.pMSelR=null;render();return;}
  if(S.pMSelL){
    const pair=S.pEx.pairs.find(p=>p.greek===S.pMSelL);
    if(pair&&pair.ru===ru){

// ─── MINI PLAYER ─────────────────────────────────────────
// playFn can be a string (text to speak) or array of {text, pitch} objects (dialogue)
function buildMiniPlayer(playFnOrText, rawText){
  const wrap=el('div','mini-player');

  // Parse into speakable segments
  let segments=[];
  if(Array.isArray(playFnOrText)){
    // Dialogue: array of {text, pitch}
    segments=playFnOrText.map(s=>({text:s.text,pitch:s.pitch||1.0}));
  } else if(typeof playFnOrText==='string'){
    // Plain text: split into sentences
    segments=playFnOrText.split(/(?<=[.!?;])\s+/).filter(s=>s.trim().length>1)
      .map(s=>({text:s.trim(),pitch:1.0}));
    if(!segments.length)segments=[{text:playFnOrText,pitch:1.0}];
  } else {
    // Legacy: function — fallback
    segments=[{text:rawText||'',pitch:1.0}];
  }

  const totalSegments=segments.length;
  // Estimate ms per segment proportional to word count
  const segMs=segments.map(s=>Math.max(s.text.split(/\s+/).length*420,600));
  const totalMs=segMs.reduce((a,b)=>a+b,0)||3000;
  const segStart=segMs.reduce((acc,ms,i)=>{acc.push(i===0?0:acc[i-1]+ms);return acc;},[]);

  let isPlaying=false;
  let currentSeg=0;   // which segment is playing/paused at
  let segStartTime=0; // when current segment started
  let raf=null;

  const btn=el('button','mp-btn');btn.innerHTML='<svg width="14" height="16" viewBox="0 0 14 16" fill="none"><polygon points="2,1 13,8 2,15" fill="white"/></svg>';
  const bar=el('div','mp-bar');
  bar.style.cssText='flex:1;height:8px;background:var(--mp-bar);border-radius:99px;cursor:pointer;position:relative;touch-action:none;user-select:none';
  const fill=el('div');
  fill.style.cssText='height:100%;background:var(--acc);border-radius:99px;width:0%;pointer-events:none';
  bar.appendChild(fill);
  const timeEl=el('div','mp-time');timeEl.textContent='0:00';

  function msElapsed(){
    if(!isPlaying)return segStart[currentSeg]||0;
    return (segStart[currentSeg]||0)+(Date.now()-segStartTime);
  }

  function updateUI(){
    const ms=Math.min(msElapsed(),totalMs);
    fill.style.width=((ms/totalMs)*100)+'%';
    const sec=Math.floor(ms/1000);
    timeEl.textContent=Math.floor(sec/60)+':'+(sec%60<10?'0':'')+sec%60;
  }

  function stopTTS(){try{speechSynthesis.cancel();}catch(e){}}

  function playFrom(segIdx){
    stopTTS();
    currentSeg=Math.max(0,Math.min(segIdx,totalSegments-1));
    isPlaying=true;
    btn.innerHTML='<svg width="14" height="16" viewBox="0 0 14 16" fill="none"><rect x="1" y="1" width="4" height="14" rx="1.5" fill="white"/><rect x="9" y="1" width="4" height="14" rx="1.5" fill="white"/></svg>';
    
    function speakSeg(i){
      if(i>=totalSegments){
        // Done
        isPlaying=false;currentSeg=0;btn.innerHTML='<svg width="14" height="16" viewBox="0 0 14 16" fill="none"><polygon points="2,1 13,8 2,15" fill="white"/></svg>';
        fill.style.width='0%';timeEl.textContent='0:00';
        return;
      }
      const seg=segments[i];
      const clean=seg.text.replace(/[а-яёА-ЯЁ]/g,'').trim();
      if(!clean){speakSeg(i+1);return;}
      currentSeg=i;
      segStartTime=Date.now();
      const u=new SpeechSynthesisUtterance(clean);
      u.lang='el-GR';u.rate=0.82;u.pitch=seg.pitch;
      if(greekVoice)u.voice=greekVoice;
      u.onend=()=>{if(isPlaying)speakSeg(i+1);};
      speechSynthesis.speak(u);
    }
    speakSeg(currentSeg);
    cancelAnimationFrame(raf);
    function tick(){
      updateUI();
      if(isPlaying)raf=requestAnimationFrame(tick);
    }
    raf=requestAnimationFrame(tick);
  }

  function pause(){
    stopTTS();
    cancelAnimationFrame(raf);
    // currentSeg stays where it is — resume will restart from this segment
    isPlaying=false;
    btn.innerHTML='<svg width="14" height="16" viewBox="0 0 14 16" fill="none"><polygon points="2,1 13,8 2,15" fill="white"/></svg>';
  }

  btn.onclick=()=>{
    if(isPlaying){pause();}
    else{playFrom(currentSeg);}
  };

  // Drag to seek
  let dragging=false,wasPlaying=false;
  function getPct(cx){const r=bar.getBoundingClientRect();return Math.max(0,Math.min(1,(cx-r.left)/r.width));}
  function seekTo(cx){
    const pct=getPct(cx);
    const ms=pct*totalMs;
    // Find which segment this ms falls in
    let seg=0;
    for(let i=0;i<totalSegments-1;i++){if(ms>=segStart[i+1])seg=i+1;else break;}
    currentSeg=seg;
    fill.style.width=(pct*100)+'%';
    const sec=Math.floor(ms/1000);
    timeEl.textContent=Math.floor(sec/60)+':'+(sec%60<10?'0':'')+sec%60;
  }
  bar.addEventListener('mousedown',e=>{e.preventDefault();wasPlaying=isPlaying;if(isPlaying)pause();dragging=true;seekTo(e.clientX);},{passive:false});
  bar.addEventListener('touchstart',e=>{e.preventDefault();wasPlaying=isPlaying;if(isPlaying)pause();dragging=true;seekTo(e.touches[0].clientX);},{passive:false});
  document.addEventListener('mousemove',e=>{if(dragging)seekTo(e.clientX);});
  document.addEventListener('touchmove',e=>{if(dragging){e.preventDefault();seekTo(e.touches[0].clientX);}},{passive:false});
  document.addEventListener('mouseup',()=>{if(dragging){dragging=false;if(wasPlaying)playFrom(currentSeg);}});
  document.addEventListener('touchend',()=>{if(dragging){dragging=false;if(wasPlaying)playFrom(currentSeg);}});

  wrap.appendChild(btn);wrap.appendChild(bar);wrap.appendChild(timeEl);
  return wrap;
}

// Highlight learned words in greek text
function highlightLearnedInText(text){
  if(!text)return text;
  const learnedWords=ALL_WORDS.filter(w=>S.learned.has(w.id)&&w.greek&&w.greek.length>=2);
  // Sort by length descending — longer words first prevents "την" matching inside "στην"
  const sorted=[...learnedWords].sort((a,b)=>b.greek.length-a.greek.length);

  // Work on plain text, track which character positions are already highlighted
  // Use a token-based approach: split into words, check each word
  const SPAN_OPEN='<span style="color:var(--acc);font-weight:800">';
  const SPAN_CLOSE='</span>';

  // Split text preserving punctuation and spaces
  const tokens=text.split(/([\s,;:.!?"«»()]+)/);
  const result=tokens.map(token=>{
    // If it's whitespace/punctuation, keep as is
    if(!token||/^[\s,;:.!?"«»()]+$/.test(token))return token;
    // Try to match this token against learned words
    // First try exact match, then stem match
    const tokenLower=token.toLowerCase();
    for(const w of sorted){
      const wLower=w.greek.toLowerCase();
      // Exact match
      if(tokenLower===wLower)return SPAN_OPEN+token+SPAN_CLOSE;
      // Stem match for long words (5+ chars): token starts with stem of learned word
      if(w.greek.length>=5){
        const stem=wLower.slice(0,w.greek.length-2);
        if(tokenLower.startsWith(stem))return SPAN_OPEN+token+SPAN_CLOSE;
      }
    }
    return token;
  });
  return result.join('');
}
