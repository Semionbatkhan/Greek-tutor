<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f0f4ff;--sur:#ffffff;--card:#ffffff;--card2:#f7f9ff;
  --acc:#4f46e5;--acc2:#ef4444;--acc3:#f59e0b;--acc4:#10b981;
  --txt:#1e1b4b;--mu:#6b7280;--ok:#10b981;--er:#ef4444;--r:16px;
  --shadow:0 2px 12px rgba(79,70,229,.10);
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}

/* NAV TOP */
.nav{background:var(--sur);border-bottom:2px solid #e0e7ff;display:flex;padding:8px 6px 0;flex-shrink:0;box-shadow:var(--shadow)}
.nt{flex:1;padding:10px 2px 9px;background:none;border:none;border-bottom:3px solid transparent;
  color:var(--mu);font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:4px;text-transform:uppercase;
  letter-spacing:.5px;transition:color .2s,border-color .2s}
.nt.on{color:var(--acc);border-bottom-color:var(--acc)}
.ni{font-size:20px}

/* SCROLL */
.sc{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.sc::-webkit-scrollbar{width:3px}
.sc::-webkit-scrollbar-thumb{background:rgba(79,70,229,.2);border-radius:2px}

/* PROGRESS */
.pb-wrap{flex:1;height:8px;background:#e0e7ff;border-radius:99px;overflow:hidden}
.pb-fill{height:100%;background:linear-gradient(90deg,var(--acc),#818cf8);border-radius:99px;transition:width .5s}
.ps{background:var(--sur);padding:8px 14px;border-bottom:1px solid #e0e7ff;display:flex;align-items:center;gap:10px;flex-shrink:0}
.pt2{font-size:12px;color:var(--mu);white-space:nowrap;font-weight:700}

/* SCORES */
.sco{display:flex;gap:8px;padding:10px 14px;background:var(--sur);border-bottom:1px solid #e0e7ff;flex-shrink:0}
.chip{background:var(--bg);border-radius:99px;padding:5px 13px;font-size:13px;font-weight:800;display:flex;align-items:center;gap:5px;border:1.5px solid #e0e7ff}
.g{color:var(--ok)}.r{color:var(--er)}.y{color:var(--acc3)}.b{color:var(--acc)}

/* CARDS */
.card{background:var(--sur);border-radius:var(--r);padding:24px;border:1.5px solid #e0e7ff;box-shadow:var(--shadow)}
.cc{text-align:center}
.be{font-size:64px;margin-bottom:10px;line-height:1}
.bw{font-family:'Nunito',sans-serif;font-size:28px;font-weight:900;line-height:1.3;color:var(--txt)}
.bwr{color:var(--acc)}
.spk{background:#e0e7ff;border:none;font-size:20px;cursor:pointer;padding:6px 10px;border-radius:12px;transition:background .15s}
.spk:active{background:#c7d2fe}
.fca{margin-top:16px;padding:14px 20px;background:#ede9fe;border:2px solid #c4b5fd;
  border-radius:12px;font-size:22px;font-weight:800;color:var(--acc);animation:fi .3s ease}
.fcr{display:flex;gap:10px;margin-top:14px}

/* CHOICES */
.chs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.cb2{padding:16px 10px;background:var(--sur);border:2px solid #e0e7ff;border-radius:14px;
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:var(--txt);cursor:pointer;transition:all .2s;text-align:center;box-shadow:var(--shadow)}
.cb2:disabled{cursor:default}
.cb2.ck{border-color:var(--ok);background:#d1fae5;color:#065f46}
.cb2.cw{border-color:var(--er);background:#fee2e2;color:#991b1b}

/* WRITE */
.wi{width:100%;padding:15px;background:var(--sur);border:2px solid #e0e7ff;
  border-radius:14px;font-family:'Nunito',sans-serif;font-size:18px;color:var(--txt);outline:none;transition:border-color .2s;font-weight:700}
.wi:focus{border-color:var(--acc)}
.wi.wok{border-color:var(--ok);background:#d1fae5}
.wi.wfl{border-color:var(--er);background:#fee2e2}
.fb{padding:13px 16px;border-radius:12px;font-size:14px;font-weight:700;animation:fi .3s;margin-top:8px}
.fbok{background:#d1fae5;color:#065f46}
.fber{background:#fee2e2;color:#991b1b}
.swl{font-size:13px;color:var(--acc);cursor:pointer;text-decoration:underline;text-align:right;margin-top:8px;font-weight:700}

/* MATCH */
.mg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mc{display:flex;flex-direction:column;gap:8px}
.mi{padding:13px;background:var(--sur);border:2px solid #e0e7ff;border-radius:12px;

.mi.ms{border-color:var(--acc);background:#ede9fe;color:var(--acc)}
.mi.mm{border-color:var(--ok);background:#d1fae5;color:#065f46;opacity:.7}
.mi.mw{border-color:var(--er);background:#fee2e2}

/* BUTTONS */
.btn{padding:15px;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:15px;
  font-weight:800;cursor:pointer;flex:1;transition:transform .15s,box-shadow .15s;box-shadow:var(--shadow)}
.btn:active{transform:scale(.96)}
.bok{background:var(--ok);color:#fff}
.ber{background:var(--er);color:#fff}
.bpr{background:var(--acc);color:#fff}
.bot{background:var(--sur);border:2px solid #e0e7ff;color:var(--txt)}
.bfw{width:100%}
.br{display:flex;gap:10px}
.ex{font-size:11px;font-weight:800;letter-spacing:2px;color:var(--acc);text-transform:uppercase;margin-bottom:10px}
.ew{display:flex;flex-direction:column;gap:14px}

/* SECTION/UNIT */
.sb{background:var(--sur);border-radius:var(--r);margin-bottom:14px;overflow:hidden;border:1.5px solid #e0e7ff;box-shadow:var(--shadow)}
.sh{padding:16px;display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,#ede9fe,#e0e7ff)}
.st{font-size:14px;font-weight:900;color:var(--acc)}
.ss{font-size:12px;color:var(--mu);margin-top:2px;font-weight:600}
.ur{padding:14px 16px;display:flex;align-items:center;gap:12px;border-top:1px solid #f0f4ff;cursor:pointer;transition:background .15s}
.ur:active{background:#f0f4ff}
.ue{font-size:24px;width:30px;text-align:center}
.ui{flex:1}
.ut{font-size:14px;font-weight:800;color:var(--txt)}
.us{font-size:12px;color:var(--mu);margin-top:2px;font-weight:600}
.ub{background:#ede9fe;border-radius:99px;padding:4px 10px;font-size:12px;color:var(--acc);font-weight:800}
.sb2{background:var(--acc);border:none;border-radius:99px;padding:7px 16px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;color:#fff;cursor:pointer}

/* UNIT PROGRESS BADGE */
.upct{font-size:12px;font-weight:800;color:var(--ok);margin-right:6px}

/* WORD LIST */

.wls{flex:1;padding:11px 14px;background:var(--sur);border:2px solid #e0e7ff;border-radius:12px;font-family:'Nunito',sans-serif;font-size:14px;color:var(--txt);outline:none;font-weight:600}

.wleb{padding:10px 14px;background:var(--acc);border:none;border-radius:12px;font-size:13px;font-weight:800;color:#fff;cursor:pointer;white-space:nowrap}
.cl{font-size:11px;font-weight:800;letter-spacing:2px;color:var(--mu);text-transform:uppercase;padding:12px 0 6px;border-bottom:1.5px solid #e0e7ff;margin-bottom:6px}
.wr{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f4ff}
.we{font-size:22px;width:28px;text-align:center}
.wg{font-size:15px;font-weight:800;flex:1;color:var(--txt)}
.wru{font-size:13px;color:var(--mu);margin-right:4px;font-weight:600}
.wsp{background:#e0e7ff;border:none;font-size:16px;cursor:pointer;padding:4px 8px;border-radius:8px;color:var(--acc)}
.cb3{width:19px;height:19px;accent-color:var(--acc);cursor:pointer;flex-shrink:0}
.pn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 0;flex-wrap:wrap}
.pgb{width:34px;height:34px;border-radius:10px;border:2px solid #e0e7ff;background:var(--sur);color:var(--txt);font-size:13px;font-weight:800;cursor:pointer}
.pgb.pa{background:var(--acc);color:#fff;border-color:var(--acc)}
.sar{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;color:var(--mu);font-weight:700}

.ptabs{display:flex;gap:6px;margin-bottom:14px}
.ptab{flex:1;padding:10px;background:var(--sur);border:2px solid #e0e7ff;border-radius:12px;

.ptab.on{background:var(--acc);color:#fff;border-color:var(--acc)}

.lw-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f4ff}
.lw-badge{background:#d1fae5;border:1.5px solid #6ee7b7;border-radius:99px;padding:3px 10px;font-size:12px;font-weight:800;color:#065f46}

/* PRACTICE */
.pe{text-align:center;padding:48px 20px;color:var(--mu)}

/* POPUP */
.po{position:fixed;inset:0;background:rgba(30,27,75,.4);display:flex;align-items:center;justify-content:center;z-index:999;animation:fi .2s}
.pb2{background:var(--sur);border-radius:20px;padding:26px;width:290px;border:2px solid #e0e7ff;text-align:center;box-shadow:0 8px 32px rgba(79,70,229,.15)}
.popt{font-size:18px;font-weight:900;margin-bottom:6px;color:var(--txt)}
.popu{font-size:13px;color:var(--mu);margin-bottom:20px;font-weight:600}

/* PHONICS */
.phc{background:var(--sur);border-radius:14px;padding:16px;border-left:4px solid var(--acc);margin-bottom:10px;box-shadow:var(--shadow)}
.phs{font-size:20px;font-weight:900;color:var(--acc)}
.phl{font-size:15px;font-weight:800;color:var(--acc3);margin:4px 0}
.phe{font-size:13px;color:var(--mu);font-weight:600}

/* PROGRESS CARDS */
.prog-card{background:var(--sur);border-radius:var(--r);padding:18px;border:1.5px solid #e0e7ff;box-shadow:var(--shadow);margin-bottom:10px}
.prog-title{font-size:11px;font-weight:800;letter-spacing:2px;color:var(--mu);text-transform:uppercase;margin-bottom:8px}
.prog-pct{font-size:28px;font-weight:900;color:var(--acc);margin-bottom:6px}

/* ANIMATIONS */
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.pop{animation:pop .3s cubic-bezier(.175,.885,.32,1.275)}

/* TOAST */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--acc);
  border-radius:99px;padding:10px 24px;font-size:14px;font-weight:800;
  color:#fff;z-index:1000;animation:fi .3s ease;white-space:nowrap;box-shadow:0 4px 20px rgba(79,70,229,.3)}

// ─── PROGRESS CALC ────────────────────────────────────────
function unitProgress(uid){return S.unitScores[uid]||0;}

function sectionProgress(sec){
  const units=sec.units;
  const totalW=units.reduce((a,u)=>a+u.words.length,0);
  if(!totalW)return 0;
  const weighted=units.reduce((a,u)=>{
    const pct=unitProgress(u.id)/100;
    return a+pct*u.words.length;
  },0);
  return Math.round((weighted/totalW)*100);
}

function bookProgress(){
  const totalW=ALL_WORDS.length;
  if(!totalW)return 0;
  const weighted=SECTIONS.flatMap(s=>s.units).reduce((a,u)=>{
    const pct=unitProgress(u.id)/100;
    return a+pct*u.words.length;
  },0);
  return Math.round((weighted/totalW)*100);
}

// ─── BUILD EXERCISE ───────────────────────────────────────
function buildEx(word,pool,forceType){
  const others=pool.filter(w=>w.id!==word.id);
  const fb=ALL_WORDS.filter(w=>w.id!==word.id);
  const src=others.length>=3?others:fb;
  const types=["FC","C4","WRITE","MATCH"];
  const type=forceType||types[Math.floor(Math.random()*types.length)];
  if(type==="MATCH"){
    const pairs=shuffle([word,...pick(src,3)]).slice(0,4);
    return{type,word,pairs,ll:shuffle(pairs.map(p=>p.greek)),rl:shuffle(pairs.map(p=>p.ru))};
  }
  if(type==="FC")return{type,word,dir:Math.random()>.5?'grToRu':'ruToGr'};
  return{type,word,opts:shuffle([word,...pick(src,3)])};
}

// ─── PRACTICE WORDS (only checked, not learned) ───────────
function pracWords(){return ALL_WORDS.filter(w=>S.checked.has(w.id)&&!S.learned.has(w.id));}

function buildPEx(){
  const pw=pracWords();
  if(!pw.length){S.pEx=null;return;}
  const word=pw[Math.floor(Math.random()*pw.length)];
  const others=pw.filter(w=>w.id!==word.id);
  const fb=ALL_WORDS.filter(w=>w.id!==word.id&&!S.learned.has(w.id));
  // Only use checked words for options too
  const src=others.length>=3?others:fb;
  const r=Math.random();
  if(r<0.5){
    S.pEx={t:'FC',word,dir:Math.random()>.5?'grToRu':'ruToGr'};S.pFcRev=false;
  } else {
    // MATCH only with checked words
    const pairs=shuffle([word,...pick(src,3)]).slice(0,4);
    S.pEx={t:'MA',word,pairs,ll:shuffle(pairs.map(p=>p.greek)),rl:shuffle(pairs.map(p=>p.ru))};
    S.pMSelL=null;S.pMSelR=null;S.pMDone=[];S.pMWrong=[];
  }
}

function startUnit(unit){
  const sess=LS.get('session',null);
  if(sess&&sess.unitId===unit.id&&sess.qi<sess.queue.length){
    S.activeUnit=unit;
    S.queue=sess.queue.map(id=>ALL_WORDS.find(w=>w.id===id)).filter(Boolean);
    S.qi=sess.qi;
    S.score=sess.score||{c:0,w:0,st:0};
    S.errs=sess.errs.map(id=>ALL_WORDS.find(w=>w.id===id)).filter(Boolean);
    S.answers=sess.answers||[];
  } else {
    S.activeUnit=unit;S.queue=shuffle(unit.words);S.qi=0;
    S.score={c:0,w:0,st:0};S.errs=[];S.answers=[];
  }
  S.mode='unit';nextEx();render();
}

function nextEx(){
  if(S.qi>=S.queue.length)return;
  const word=S.queue[S.qi%S.queue.length];
  S.ex=buildEx(word,S.queue);
  S.fcRev=false;S.chosen=null;S.wv='';S.ws=null;
  S.mSelGr=null;S.mSelRu=null;S.mDone=[];S.mWrong=[];S.mDoneAll=false;S.mWrongCount=0;
}

function advance(ok){
  S.score.c+=ok?1:0;S.score.w+=ok?0:1;S.score.st=ok?S.score.st+1:0;
  if(!S.answers)S.answers=[];
  S.answers.push(ok?'ok':'err');
  if(!ok&&S.ex?.word){
    S.errs.push(S.ex.word);
    if(!S.checked.has(S.ex.word.id)){
      S.checked.add(S.ex.word.id);
    }
  }
  S.qi++;
  save();
  if(S.qi<S.queue.length){nextEx();render();}
  else{
    const pct=Math.round((S.score.c/(S.score.c+S.score.w||1))*100);
    S.unitScores[S.activeUnit.id]=pct;
    // Save errors for retry button on home screen
    if(S.errs.length>0){
      LS.set('unitErrs_'+S.activeUnit.id, S.errs.map(w=>w.id));
    } else {
      LS.set('unitErrs_'+S.activeUnit.id, []);
    }
    LS.set('session',null);
    save();render();
  }
}

    const em=el('div','be');em.textContent=word.emoji;card.appendChild(em);
    if(isGR){
      const row=el('div');row.style.cssText='display:flex;align-items:center;justify-content:center;gap:10px';
      const w=el('div','bw');w.textContent=word.greek;row.appendChild(w);row.appendChild(spkBtn());card.appendChild(row);
    }else{
      const w=el('div','bw bwr');w.textContent=word.ru;card.appendChild(w);
    }
    if(!S.fcRev){
      const hint=el('div');hint.style.cssText='margin-top:20px;cursor:pointer;color:var(--mu);font-size:15px;font-weight:700';
      hint.textContent='👆 Нажми — '+(isGR?'покажу перевод':'покажу по-гречески');
      hint.onclick=()=>{S.fcRev=true;render();};card.appendChild(hint);
    }else{
      const ans=el('div','fca');
      if(isGR){ans.textContent=word.ru;}
      else{const row=el('div');row.style.cssText='display:flex;align-items:center;justify-content:center;gap:10px';const w=el('span');w.textContent=word.greek;row.appendChild(w);row.appendChild(spkBtn());ans.appendChild(row);}
      card.appendChild(ans);
      const fcr=el('div','fcr');
      const nb=el('button','btn ber');nb.textContent='Не знал 😬';nb.onclick=()=>advance(false);
      const yb=el('button','btn bok');yb.textContent='Знал! ✅';yb.onclick=()=>advance(true);
      fcr.appendChild(nb);fcr.appendChild(yb);card.appendChild(fcr);
    }
    ew.appendChild(card);
  }
  else if(type==='C4'){
    const ruToGr=!!S.ex.ruToGr;
    const lbl=el('div','ex');lbl.textContent=ruToGr?'Выбери по-гречески':'Выбери перевод';ew.appendChild(lbl);
    const card=el('div','card cc');
    const em=el('div','be');em.textContent=word.emoji;card.appendChild(em);
    if(ruToGr){
      const w=el('div','bw bwr');w.textContent=word.ru;card.appendChild(w);
    } else {
      const row=el('div');row.style.cssText='display:flex;align-items:center;justify-content:center;gap:10px';
      const w=el('div','bw');w.textContent=word.greek;row.appendChild(w);row.appendChild(spkBtn());card.appendChild(row);
    }
    ew.appendChild(card);
    const chs=el('div','chs');
    S.ex.opts.forEach(o=>{
      let cls='cb2';if(S.chosen){if(o.id===word.id)cls+=' ck';else if(o.id===S.chosen)cls+=' cw';}
      const b=el('button',cls);
      b.textContent=ruToGr?o.greek:o.ru;
      if(S.chosen)b.disabled=true;
      b.onclick=()=>{if(ruToGr)speak(o.greek);S.chosen=o.id;render();setTimeout(()=>advance(o.id===word.id),1000);};
      chs.appendChild(b);
    });
    ew.appendChild(chs);
  }
  else if(type==='WRITE'){
    const wDir=S.ex.dir||'ruToGr';
    const isGrWrite=wDir==='grToRu'; // show greek, type russian - not typical, so ruToGr = show ru, type greek
    const lbl=el('div','ex');lbl.textContent='Напиши по-гречески';ew.appendChild(lbl);
    const card=el('div','card cc');
    const em=el('div','be');em.textContent=word.emoji;card.appendChild(em);
    // Always show Russian, type Greek (most useful for learner)
    const w=el('div','bw bwr');w.textContent=word.ru;card.appendChild(w);
    ew.appendChild(card);
    const inp=el('input','wi'+(S.ws?' w'+S.ws:''));
    inp.value=S.wv;inp.placeholder='Греческими буквами...';if(S.ws)inp.disabled=true;
    inp.oninput=e=>{S.wv=e.target.value;};
    inp.onkeydown=e=>{if(e.key==='Enter'&&!S.ws)doWrite();};
    ew.appendChild(inp);
    if(S.ws){
      const fb=el('div','fb '+(S.ws==='ok'?'fbok':'fber'));
      fb.textContent=S.ws==='ok'?`✅ Верно! ${word.greek}`:`❌ Правильно: ${word.greek}`;
      ew.appendChild(fb);
    }else{
      const cb=el('button','btn bpr bfw');cb.textContent='Проверить';cb.onclick=doWrite;ew.appendChild(cb);
      const sw=el('div','swl');sw.textContent='Не могу писать — выбрать из 4 →';
      sw.onclick=()=>{
        const src=ALL_WORDS.filter(w=>w.id!==word.id);
        // Card stays with Russian word, 4 options in Greek
        S.ex={type:'C4',word,opts:shuffle([word,...pick(src,3)]),ruToGr:true};
        S.wv='';S.ws=null;S.chosen=null;render();
      };
      ew.appendChild(sw);
    }
  }
  else if(type==='MATCH'){
    const lbl=el('div','ex');lbl.textContent='Соедини пары · 🔊 при нажатии';ew.appendChild(lbl);
    if(S.mDoneAll){const done=el('div','card cc pop');done.style.color='var(--ok)';done.style.fontSize='20px';done.textContent='🎉 Все пары найдены!';ew.appendChild(done);}
    const mg=el('div','mg');
    const mcL=el('div','mc'),mcR=el('div','mc');
    S.ex.ll.forEach(gr=>{
      let cls='mi';if(S.mDone.includes(gr))cls+=' mm';else if(S.mSelGr===gr)cls+=' ms';else if(S.mWrong.includes(gr))cls+=' mw';
      const d=el('div',cls);d.textContent='🔊 '+gr;d.onclick=()=>handleMGr(gr);mcL.appendChild(d);
    });
    S.ex.rl.forEach(ru=>{
      const pair=S.ex.pairs.find(p=>p.ru===ru);let cls='mi';
      if(S.mDone.includes(pair?.greek))cls+=' mm';else if(S.mSelRu===ru)cls+=' ms';else if(S.mWrong.includes(ru))cls+=' mw';
      const d=el('div',cls);d.textContent=ru;d.onclick=()=>handleMRu(ru);mcR.appendChild(d);
    });
    mg.appendChild(mcL);mg.appendChild(mcR);ew.appendChild(mg);
    if(S.mDoneAll){const nb=el('button','btn bpr bfw');nb.textContent='Далее →';nb.onclick=()=>advance(S.mWrongCount===0);ew.appendChild(nb);}
  }
  return ew;
}

function doWrite(){
  const ok=S.wv.trim().toLowerCase()===S.ex.word.greek.toLowerCase();
  S.ws=ok?'ok':'fl';render();setTimeout(()=>advance(ok),1300);
}

function handleMGr(gr){
  speak(gr);if(S.mDone.includes(gr))return;
  if(S.mSelRu){
    const pair=S.ex.pairs.find(p=>p.greek===gr);
    if(pair&&pair.ru===S.mSelRu){S.mDone=[...S.mDone,gr];S.mSelGr=null;S.mSelRu=null;if(S.mDone.length===S.ex.pairs.length)S.mDoneAll=true;}
    else{S.mWrongCount=(S.mWrongCount||0)+1;S.mWrong=[gr,S.mSelRu];setTimeout(()=>{S.mWrong=[];S.mSelGr=null;S.mSelRu=null;render();},700);}
  }else S.mSelGr=gr;render();
}
function handleMRu(ru){
  const pGr=S.ex.pairs.find(p=>p.ru===ru)?.greek;if(S.mDone.includes(pGr))return;
  if(S.mSelGr){
    const pair=S.ex.pairs.find(p=>p.greek===S.mSelGr);
    if(pair&&pair.ru===ru){S.mDone=[...S.mDone,S.mSelGr];S.mSelGr=null;S.mSelRu=null;if(S.mDone.length===S.ex.pairs.length)S.mDoneAll=true;}
    else{S.mWrongCount=(S.mWrongCount||0)+1;S.mWrong=[S.mSelGr,ru];setTimeout(()=>{S.mWrong=[];S.mSelGr=null;S.mSelRu=null;render();},700);}
  }else S.mSelRu=ru;render();
}

// ─── WORDS ────────────────────────────────────────────────
function renderWords(){
  const sc=el('div','sc');
  const q=S.wlSearch.toLowerCase();
  const filtered=ALL_WORDS.filter(w=>!q||w.greek.toLowerCase().includes(q)||w.ru.toLowerCase().includes(q));
  const totalPages=Math.ceil(filtered.length/PER_PAGE);
  if(S.wlPage>=totalPages)S.wlPage=0;
  const pageWords=filtered.slice(S.wlPage*PER_PAGE,(S.wlPage+1)*PER_PAGE);
  const allCk=pageWords.length>0&&pageWords.every(w=>S.checked.has(w.id));

  const wlt=el('div','wlt');
  const inp=el('input','wls');inp.placeholder='Поиск...';inp.value=S.wlSearch;
  inp.oninput=e=>{S.wlSearch=e.target.value;S.wlPage=0;render();};
  wlt.appendChild(inp);
  const eb=el('button','wleb');eb.textContent='↓ Конец';
  eb.onclick=()=>document.getElementById('wl-end')?.scrollIntoView({behavior:'smooth'});
  wlt.appendChild(eb);sc.appendChild(wlt);

  const sar=el('div','sar');
  const cb=el('input');cb.type='checkbox';cb.className='cb3';cb.checked=allCk;
  cb.onchange=()=>{const ids=pageWords.map(w=>w.id);ids.forEach(id=>allCk?S.checked.delete(id):S.checked.add(id));save();render();};
  sar.appendChild(cb);
  const sal=el('span');sal.textContent='Выбрать все на стр.';sar.appendChild(sal);
  const sc2=el('span');sc2.style.cssText='margin-left:auto;color:var(--acc);font-weight:800';
  sc2.textContent=`⚡ ${S.checked.size} в практике`;sar.appendChild(sc2);
  sc.appendChild(sar);

  const groups={};
  pageWords.forEach(w=>{(groups[w.cat]=groups[w.cat]||[]).push(w);});
  Object.entries(groups).forEach(([cat,words])=>{
    const cl=el('div','cl');cl.textContent=`${cat} (${words.length})`;sc.appendChild(cl);
    words.forEach(w=>{
      const wr=el('div','wr');
      const wc=el('input');wc.type='checkbox';wc.className='cb3';wc.checked=S.checked.has(w.id);
      wc.onchange=()=>{S.checked.has(w.id)?S.checked.delete(w.id):S.checked.add(w.id);save();render();};
      const we=el('div','we');we.textContent=w.emoji;
      const wg=el('div','wg');wg.textContent=w.greek;
      const wru=el('div','wru');wru.textContent=w.ru;
      const wsp=el('button','wsp');wsp.textContent='🔊';wsp.onclick=()=>speak(w.greek);
      wr.appendChild(wc);wr.appendChild(we);wr.appendChild(wg);wr.appendChild(wru);wr.appendChild(wsp);
      sc.appendChild(wr);
    });
  });

  const endDiv=el('div');endDiv.id='wl-end';sc.appendChild(endDiv);
  if(totalPages>1){
    const pn=el('div','pn');
    for(let i=0;i<totalPages;i++){
      const pb=el('button','pgb'+(S.wlPage===i?' pa':''));pb.textContent=i+1;
      pb.onclick=(()=>{const p=i;return()=>{S.wlPage=p;save();render();}; })();
      pn.appendChild(pb);
    }
    sc.appendChild(pn);
  }
  return sc;
}

// ─── PRACTICE ─────────────────────────────────────────────
function renderPractice(){
  const wrap=el('div','sc');

  // TABS
  const tabs=el('div','ptabs');
  const t1=el('button','ptab'+(S.practiceTab==='practice'?' on':''));
  t1.textContent=`⚡ Практика (${pracWords().length})`;
  t1.onclick=()=>{S.practiceTab='practice';save();render();};
  const t2=el('button','ptab'+(S.practiceTab==='learned'?' on':''));
  t2.textContent=`✅ Выученные (${S.learned.size})`;
  t2.onclick=()=>{S.practiceTab='learned';save();render();};
  tabs.appendChild(t1);tabs.appendChild(t2);wrap.appendChild(tabs);

  if(S.practiceTab==='learned'){
    return renderLearnedWords(wrap);
  }

  const pw=pracWords();
  if(!pw.length){
    const pe=el('div','pe');
    pe.innerHTML=`<div style="font-size:52px;margin-bottom:14px">📋</div><div style="font-size:18px;font-weight:800;margin-bottom:8px">Нет слов для практики</div><div style="font-size:14px;font-weight:600">Отметь галочкой в разделе «Слова»</div>`;
    wrap.appendChild(pe);return wrap;
  }
  if(!S.pEx)buildPEx();
  if(!S.pEx)return wrap;

  // FC exercise
  if(S.pEx.t==='FC'){
    const word=S.pEx.word;
    const isGR=S.pEx.dir==='grToRu';
    const card=el('div','card cc');
    // Long press to remove
    card.onmousedown=()=>{lpTimer=setTimeout(()=>{S.popup={word,fromPractice:true};render();},650);};
    card.onmouseup=card.onmouseleave=()=>clearTimeout(lpTimer);
    card.ontouchstart=e=>{lpTimer=setTimeout(()=>{S.popup={word,fromPractice:true};render();},650);};
    card.ontouchend=()=>clearTimeout(lpTimer);

    const em=el('div','be');em.textContent=word.emoji;card.appendChild(em);
    if(isGR){
      const row=el('div');row.style.cssText='display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:4px';
      const w=el('div','bw');w.textContent=word.greek;
      const sb=el('button','spk');sb.textContent='🔊';sb.onclick=e=>{e.stopPropagation();speak(word.greek);};
      row.appendChild(w);row.appendChild(sb);card.appendChild(row);
    }else{
      const w=el('div','bw bwr');w.textContent=word.ru;card.appendChild(w);
    }
    if(!S.pFcRev){
      const btn2=el('button','btn bot');btn2.style.cssText='margin-top:16px;flex:unset;padding:10px 24px';
      btn2.textContent='Показать '+(isGR?'перевод':'по-гречески');
      btn2.onclick=()=>{S.pFcRev=true;render();};card.appendChild(btn2);
    }else{
      const ans=el('div','fca');
      if(isGR){ans.textContent=word.ru;}
      else{
        const row=el('div');row.style.cssText='display:flex;align-items:center;justify-content:center;gap:10px';
        const w=el('span');w.textContent=word.greek;
        const sb=el('button','spk');sb.textContent='🔊';sb.onclick=e=>{e.stopPropagation();speak(word.greek);};
        row.appendChild(w);row.appendChild(sb);ans.appendChild(row);
      }
      card.appendChild(ans);
      const fcr=el('div','fcr');
      const nb=el('button','btn ber');nb.textContent='Не знал';nb.onclick=()=>{buildPEx();render();};
      const yb=el('button','btn bok');yb.textContent='Знал! ✅';yb.onclick=()=>{buildPEx();render();};
      fcr.appendChild(nb);fcr.appendChild(yb);card.appendChild(fcr);
    }
    wrap.appendChild(card);
  }

  // MATCH exercise — only checked words
  else if(S.pEx.t==='MA'){
    const lbl=el('div');lbl.style.cssText='font-size:12px;color:var(--mu);font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px';
    lbl.textContent='Соедини · 🔊 = озвучка · удержи = убрать';wrap.appendChild(lbl);
    const mg=el('div','mg');
    const mcL=el('div','mc'),mcR=el('div','mc');
    S.pEx.ll.forEach(gr=>{
      const isD=S.pMDone.includes(gr);
      let cls='mi'+(isD?' mm':S.pMSelL===gr?' ms':S.pMWrong.includes(gr)?' mw':'');
      const d=el('div',cls);d.textContent='🔊 '+gr;
      d.onclick=()=>handlePL(gr);
      const pair=S.pEx.pairs.find(p=>p.greek===gr);
      d.onmousedown=()=>{lpTimer=setTimeout(()=>{S.popup={word:pair,fromPractice:true,fromMatch:gr};render();},650);};
      d.onmouseup=d.onmouseleave=()=>clearTimeout(lpTimer);
      d.ontouchstart=()=>{lpTimer=setTimeout(()=>{S.popup={word:pair,fromPractice:true,fromMatch:gr};render();},650);};
      d.ontouchend=()=>clearTimeout(lpTimer);
      mcL.appendChild(d);
    });
    S.pEx.rl.forEach(ru=>{
      const pGr=S.pEx.pairs.find(p=>p.ru===ru)?.greek;
      const isD=S.pMDone.includes(pGr);
      let cls='mi'+(isD?' mm':S.pMSelR===ru?' ms':S.pMWrong.includes(ru)?' mw':'');
      const d=el('div',cls);d.textContent=ru;d.onclick=()=>handlePR(ru);mcR.appendChild(d);
    });
    mg.appendChild(mcL);mg.appendChild(mcR);wrap.appendChild(mg);
  }

  return wrap;
}

function handlePL(gr){
  speak(gr);if(S.pMDone.includes(gr))return;
  if(S.pMSelR){
    const pair=S.pEx.pairs.find(p=>p.greek===gr);
    if(pair&&pair.ru===S.pMSelR){
      S.pMDone=[...S.pMDone,gr];S.pMSelL=null;S.pMSelR=null;
      if(S.pMDone.length===S.pEx.pairs.length)setTimeout(()=>{buildPEx();render();},600);
    }else{S.pMWrong=[gr,S.pMSelR];setTimeout(()=>{S.pMWrong=[];S.pMSelL=null;S.pMSelR=null;render();},700);}
  }else S.pMSelL=gr;render();
}
function handlePR(ru){
  const pGr=S.pEx.pairs.find(p=>p.ru===ru)?.greek;if(S.pMDone.includes(pGr))return;
  if(S.pMSelL){
    const pair=S.pEx.pairs.find(p=>p.greek===S.pMSelL);
    if(pair&&pair.ru===ru){
      S.pMDone=[...S.pMDone,S.pMSelL];S.pMSelL=null;S.pMSelR=null;
      if(S.pMDone.length===S.pEx.pairs.length)setTimeout(()=>{buildPEx();render();},600);
    }else{S.pMWrong=[S.pMSelL,ru];setTimeout(()=>{S.pMWrong=[];S.pMSelL=null;S.pMSelR=null;render();},700);}
  }else S.pMSelR=ru;render();
}

// ─── LEARNED WORDS TAB ────────────────────────────────────
function renderLearnedWords(wrap){
  if(!S.learned.size){
    const pe=el('div','pe');
    pe.innerHTML=`<div style="font-size:52px;margin-bottom:14px">🎓</div><div style="font-size:18px;font-weight:800;margin-bottom:8px">Нет выученных слов</div><div style="font-size:14px;font-weight:600">Долгое нажатие на слово в практике → убрать → оно появится здесь</div>`;
    wrap.appendChild(pe);return wrap;
  }

  const learnedWords=ALL_WORDS.filter(w=>S.learned.has(w.id));
  const q=S.lwSearch.toLowerCase();
  const filtered=learnedWords.filter(w=>!q||w.greek.toLowerCase().includes(q)||w.ru.toLowerCase().includes(q));

  // Search
  const wlt=el('div','wlt');
  const inp=el('input','wls');inp.placeholder='Поиск в выученных...';inp.value=S.lwSearch;
  inp.oninput=e=>{S.lwSearch=e.target.value;render();};
  wlt.appendChild(inp);wrap.appendChild(wlt);

  // Select all to return
  const allSel=filtered.every(w=>S.checked.has(w.id)&&!S.learned.has(w.id));
  const sar=el('div','sar');
  const cb=el('input');cb.type='checkbox';cb.className='cb3';cb.checked=false;
  cb.onchange=()=>{
    // Return all filtered back to practice
    filtered.forEach(w=>{S.learned.delete(w.id);S.checked.add(w.id);});
    save();showToast('Все слова возвращены в практику');
  };
  sar.appendChild(cb);
  const sal=el('span');sal.textContent='Вернуть все в практику';sar.appendChild(sal);
  wrap.appendChild(sar);

  filtered.forEach(w=>{
    const row=el('div','lw-row');
    const wc=el('input');wc.type='checkbox';wc.className='cb3';wc.checked=false;
    wc.onchange=()=>{S.learned.delete(w.id);S.checked.add(w.id);save();showToast(`${w.greek} возвращено в практику`);};
    const we=el('div','we');we.textContent=w.emoji;
    const wg=el('div','wg');wg.textContent=w.greek;
    const wru=el('div','wru');wru.textContent=w.ru;
    const badge=el('div','lw-badge');badge.textContent='✓ выучено';
    const wsp=el('button','wsp');wsp.textContent='🔊';wsp.onclick=()=>speak(w.greek);
    row.appendChild(wc);row.appendChild(we);row.appendChild(wg);row.appendChild(wru);row.appendChild(badge);row.appendChild(wsp);
    wrap.appendChild(row);
  });
  return wrap;
}

// ─── PHONICS ──────────────────────────────────────────────
function renderPhonics(){
  const sc=el('div','sc');
  PHONICS.forEach(p=>{
    const c=el('div','phc');
    c.innerHTML=`<div class="phs">${p.sound}</div><div class="phl">${p.letters}</div><div class="phe">${p.example}</div>`;
    sc.appendChild(c);
  });
  return sc;
}

// ─── POPUP ────────────────────────────────────────────────
function renderPopup(){
  const po=el('div','po');
  po.onclick=()=>{S.popup=null;render();};
  const pb=el('div','pb2');pb.onclick=e=>e.stopPropagation();
  const pt=el('div','popt');pt.textContent=S.popup.word?.greek||'';pb.appendChild(pt);
  const pu=el('div','popu');pu.textContent='Отметить как выученное?';pb.appendChild(pu);
  const br=el('div','br');
  const nb=el('button','btn bot');nb.textContent='Нет';nb.onclick=()=>{S.popup=null;render();};
  const yb=el('button','btn bok');yb.textContent='Да, выучил! ✅';
  yb.onclick=()=>{
    const word=S.popup.word;
    const fromMatch=S.popup.fromMatch;
    if(word){
      S.learned.add(word.id);
      S.checked.delete(word.id);
      // If from match, remove pair from current exercise
      if(fromMatch&&S.pEx&&S.pEx.t==='MA'){
        S.pEx.pairs=S.pEx.pairs.filter(p=>p.greek!==fromMatch);
        S.pEx.ll=S.pEx.ll.filter(g=>g!==fromMatch);
        S.pEx.rl=S.pEx.rl.filter(r=>r!==word.ru);
        S.pMDone=S.pMDone.filter(g=>g!==fromMatch);
        if(S.pEx.pairs.length===0){buildPEx();}
      } else {
        buildPEx();
      }
    }
    S.popup=null;save();showToast('⭐ Добавлено в выученные!');
  };
  br.appendChild(nb);br.appendChild(yb);pb.appendChild(br);po.appendChild(pb);
  return po;
}

// ─── INIT ─────────────────────────────────────────────────
render();
</script>
