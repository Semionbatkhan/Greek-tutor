      <div style="font-size:18px;font-weight:900;color:var(--acc);margin-bottom:12px">✨ Как генерируется текст</div>
      <div style="font-size:13px;font-weight:700;color:var(--txt);line-height:1.7;margin-bottom:10px">
        Берётся до 65 случайных слов из твоих <b>выученных</b>. Claude составляет связный текст (65–100 слов), органично вписывая их. Одна сцена, одно место. Если слов не хватает — добавляются только базовые слова А1. Никаких посторонних стран и городов.
      </div>
      <div style="font-size:12px;font-weight:800;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Жанры по очереди:</div>
      <div style="font-size:13px;font-weight:700;color:var(--txt);line-height:1.8">
        📔 <b>Дневник</b> — от первого лица, один день<br>
        💬 <b>Диалог</b> — разговор двух людей, каждый своим голосом<br>
        📖 <b>История</b> — рассказ от третьего лица
      </div>
      <div style="font-size:13px;font-weight:700;color:var(--txt);line-height:1.7;margin-top:10px">
        Выученные слова <b style="color:var(--acc)">подсвечены синим</b>. Диалог озвучивается двумя голосами — мужским и женским.
      </div>
      <div style="font-size:12px;color:var(--mu);margin-top:10px;font-weight:600">Текст сохраняется — он останется даже если выйти из браузера.</div>
    `;
    const cb=el('button','btn bpr bfw');cb.style.marginTop='14px';cb.textContent='Понятно';
    cb.onclick=()=>{S.popup=null;render();};pb.appendChild(cb);
    po.appendChild(pb);return po;
  }

  // ── Info popup: match exercise ──
  if(S.popup.type==='resetUnit'){
    pb.style.cssText='background:var(--sur);border-radius:20px;padding:22px;width:290px;border:2px solid var(--border);text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.2)';
    pb.innerHTML=`
      <div style="font-size:36px;margin-bottom:10px">↺</div>
      <div style="font-size:17px;font-weight:900;color:var(--txt);margin-bottom:8px">Сбросить прогресс?</div>
      <div style="font-size:13px;color:var(--mu);font-weight:600;margin-bottom:20px;line-height:1.5">
        Все упражнения юнита начнутся заново.<br>Прогресс юнита обнулится.
      </div>
    `;
    const br=el('div','br');
    const nb=el('button','btn bot');nb.textContent='Отмена';
    nb.onclick=()=>{S.popup=null;render();};
    const yb=el('button','btn ber');yb.textContent='Сбросить';
    yb.onclick=()=>{
      const uid=S.popup.unitId||'s1u0';
      // Reset unit score
      if(S.unitScores)S.unitScores[uid]=0;
      LS.set('unitScores',S.unitScores);
      // Clear saved session and adaptive state
      LS.set('session',null);
      LS.set('adaptState',null);
      LS.set('unitQueueLen_'+uid,0);
      LS.set('unitErrs_'+uid,[]);
      // Reset adaptive state
      S.adaptPhase='theory';
      S.adaptUnknown=[];
      S.adaptC4Wrong=[];
      S.adaptCollWrong=[];
      S.adaptWordIdx=0;
      S.adaptAnswered=0;
      S.answers=[];
      S.score={c:0,w:0,st:0};
      S.errs=[];
      S.popup=null;
      save();
      showToast('✅ Прогресс сброшен');
      // Restart unit
      startAdaptiveUnit(S.activeUnit);
    };
    br.appendChild(nb);br.appendChild(yb);pb.appendChild(br);
    po.appendChild(pb);return po;
  }

  if(S.popup.type==='bookInfo'){
    pb.style.cssText='background:var(--sur);border-radius:20px;padding:22px;width:310px;border:2px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,.2)';
    pb.innerHTML=`
      <div style="font-size:17px;font-weight:900;color:var(--acc);margin-bottom:14px">📚 Как пользоваться учебником</div>
      <div style="font-size:14px;color:var(--txt);font-weight:600;line-height:1.7">
        Все слова, которые вы встретите в юнитах ниже, по умолчанию добавлены в раздел <b>Практика</b>. После окончания каждого юнита заходите в раздел <b>Практика</b>, чтобы «добить» те слова, которые плохо запомнились — с помощью текстов и упражнений.<br><br>
        <b>Важно:</b> Все юниты в разделе «Учиться» не предназначены для запоминания слов, а только для первоначального ознакомления с ними. Вся отработка по запоминанию подразумевается в разделе «Практика».
      </div>
    `;
    const cb=el('button','btn bpr bfw');cb.style.marginTop='16px';cb.textContent='Понятно';
    cb.onclick=()=>{S.popup=null;render();};pb.appendChild(cb);
    po.appendChild(pb);return po;
  }

  if(S.popup.type==='matchInfo'){
    pb.style.cssText='background:var(--sur);border-radius:20px;padding:22px;width:310px;border:2px solid #333;box-shadow:0 8px 32px rgba(0,0,0,.7)';
    pb.innerHTML=`
      <div style="font-size:18px;font-weight:900;color:var(--acc);margin-bottom:12px">🔗 Как тренировать сопоставление</div>
      <div style="font-size:14px;font-weight:700;color:var(--txt);line-height:1.7">
        Старайся проверять себя <b>с русского на греческий</b> — читай русское слово и вспоминай греческое.<br><br>
        Именно так работает речь: ты думаешь по-русски и переводишь на греческий — а не наоборот.
      </div>
      <div style="font-size:13px;color:var(--mu);margin-top:10px;font-weight:600">
        👆 Нажатие на греческое слово = озвучка<br>
        👆 Удержи любое слово из пары = отметить как выученное
      </div>
    `;
    const cb=el('button','btn bpr bfw');cb.style.marginTop='14px';cb.textContent='Понятно';
    cb.onclick=()=>{S.popup=null;render();};pb.appendChild(cb);
    po.appendChild(pb);return po;
  }

  const pt=el('div','popt');pt.textContent=S.popup.word?.greek||'';pb.appendChild(pt);
  const pu=el('div','popu');pu.textContent='Отметить как выученное?';pb.appendChild(pu);
  const br=el('div','br');
  const nb=el('button','btn bot');nb.textContent='Нет';nb.onclick=()=>{S.popup=null;render();};
  const yb=el('button','btn bok');yb.textContent='⭐ Да, выучил!';
  yb.onclick=()=>{
    const word=S.popup.word;
    const fromMatch=S.popup.fromMatch;
    if(word){
      S.learned.add(word.id);
      S.checked.delete(word.id); // remove from practice, remove checkbox in words
      // If from match, remove pair from current exercise
      if(fromMatch&&S.pEx&&S.pEx.t==='MA'){
        S.pEx.pairs=S.pEx.pairs.filter(p=>p.greek!==fromMatch);
        S.pEx.ll=S.pEx.ll.filter(g=>g!==fromMatch);
        S.pEx.rl=S.pEx.rl.filter(r=>r!==word.ru);
        S.pMDone=S.pMDone.filter(g=>g!==fromMatch);
        S.pMDone=S.pMDone.filter(g=>g!==fromMatch);
        // If all remaining pairs are matched, move to next exercise
        const remaining=S.pEx.pairs.filter(p=>!S.pMDone.includes(p.greek));
        if(S.pEx.pairs.length===0||remaining.length===0){buildPEx();}
      } else {
        buildPEx();
      }
    }
    S.popup=null;save();showToast('⭐ Добавлено в выученные!');
  };
  br.appendChild(nb);br.appendChild(yb);pb.appendChild(br);po.appendChild(pb);
  return po;
}

// ─── INIT ─────────────────────────────────────────────────
// Version migration: preserve user progress across updates
// We never wipe localStorage - only add new words to checked
(function migrate(){
  try {
    const currentIds=new Set(ALL_IDS);
    const savedChecked=new Set(LS.get('checked',null)||ALL_IDS);
    ALL_IDS.forEach(id=>{
      if(!savedChecked.has(id)){savedChecked.add(id);}
    });
    S.checked=savedChecked;
    LS.set('checked',[...savedChecked]);
  } catch(e) {
    console.warn('Migration error, clearing localStorage:', e);
    try { localStorage.clear(); } catch(e2) {}
    S.checked=new Set(ALL_IDS);
  }
})();

// Restore session — only if user was inside a unit when they left
(function restoreSession(){try{
  const lastMode=LS.get('lastMode',null);
  const lastUnitId=LS.get('lastUnitId',null);
  // Restore if user was inside a unit — both on refresh AND on return from another app
  if(lastMode!=='unit'||!lastUnitId)return;
  const unit=SECTIONS.flatMap(s=>s.units).find(u=>u.id===lastUnitId);
  if(!unit)return;
  S.activeUnit=unit;
  S.mode='unit';
  if(isAdaptiveUnit(unit)){
    const saved=LS.get('adaptState',null);
    if(saved&&saved.unitId===lastUnitId&&saved.phase){
      S.adaptPhase=saved.phase;
      S.adaptUnknown=saved.unknown||[];
      S.adaptC4Wrong=saved.c4wrong||[];
      S.adaptCollWrong=saved.collwrong||[];
      S.adaptWordIdx=saved.wordIdx||0;
      S.adaptAnswered=saved.answered||0;
      S.answers=saved.answers||[];
      S.score=saved.score||{c:0,w:0,st:0};
      if(saved.phase==='theory'){
        // Rebuild theory queue and restore qi position
        const theories=THEORY_CARDS.filter(t=>t.unitId===unit.id);
        S.queue=theories.map(t=>({type:'THEORY_SLOT',theoryId:t.id}));
        S.qi=Math.min(saved.qi||0, Math.max(0,S.queue.length-1));
        nextEx();
      } else if(saved.phase==='summary'){startAdaptiveSummary();}
    } else {
      startAdaptiveUnit(unit);
    }
  } else {
    const sess=LS.get('session',null);
    if(sess&&sess.unitId===lastUnitId){
      S.queue=sess.queue.map(item=>{
        if(!item)return null;
        if(item.type&&['FILL_SLOT','LISTEN_SLOT','THEORY_SLOT'].includes(item.type))return item;
        if(item.type&&['FC','C4','WRITE','MATCH'].includes(item.type))return item;
        return ALL_WORDS.find(w=>w.id===item);
      }).filter(Boolean);
      S.qi=sess.qi||0;
      S.score=sess.score||{c:0,w:0,st:0};
      S.answers=sess.answers||[];
      nextEx();
    } else {
      startUnit(unit);
    }
  }
} catch(e){console.warn('Restore error:',e);S.mode='home';}})();

try{render();}catch(e){console.error('Render error:',e);localStorage.clear();location.reload();}
</script>
