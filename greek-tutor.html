// ─── TTS ───────────────────────────────────────────────────
let greekVoice = null;
function loadVoice(){
  const voices = speechSynthesis.getVoices();
  greekVoice = voices.find(v=>v.lang==='el-GR')||voices.find(v=>v.lang==='el')||voices.find(v=>v.lang.startsWith('el'))||null;
}
if(window.speechSynthesis){
  loadVoice();
  speechSynthesis.onvoiceschanged = loadVoice;
}
function speak(text){
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='el-GR'; u.rate=0.82; u.pitch=1;
  if(greekVoice) u.voice=greekVoice;
  speechSynthesis.speak(u);
}

const shuffle = a=>[...a].sort(()=>Math.random()-.5);
const pick = (a,n)=>shuffle(a).slice(0,n);

function buildEx(word, pool, forceType){
  const others = pool.filter(w=>w.id!==word.id);
  const fb = ALL_WORDS.filter(w=>w.id!==word.id);
  const src = others.length>=3?others:fb;
  const types = ["FC","C4","WRITE","MATCH"];
  const type = forceType||types[Math.floor(Math.random()*types.length)];
  if(type==="MATCH"){
    const pairs = shuffle([word,...pick(src,3)]).slice(0,4);
    return {type,word,pairs,ll:shuffle(pairs.map(p=>p.greek)),rl:shuffle(pairs.map(p=>p.ru))};
  }
  if(type==="FC"){
    return {type,word,dir:Math.random()>.5?"grToRu":"ruToGr"};
  }
  return {type,word,opts:shuffle([word,...pick(src,3)])};
}

function startUnit(unit){
  S.activeUnit=unit; S.queue=shuffle(unit.words); S.qi=0;
  S.score={c:0,w:0,st:0}; S.errs=[]; S.mode='unit';
  nextEx(); render();
}

function nextEx(){
  if(S.qi>=S.queue.length) return;
  const word = S.queue[S.qi%S.queue.length];
  S.ex = buildEx(word, S.queue);
  S.fcRev=false; S.chosen=null; S.wv=''; S.ws=null;
  S.mSelGr=null; S.mSelRu=null; S.mDone=[]; S.mWrong=[]; S.mDoneAll=false;
}

function advance(ok){
  S.score.c += ok?1:0;
  S.score.w += ok?0:1;
  S.score.st = ok?S.score.st+1:0;
  if(!ok && S.ex?.word) S.errs.push(S.ex.word);
  S.qi++;
  if(S.qi<S.queue.length){ nextEx(); render(); }
  else{
    // save unit score
    const pct = Math.round((S.score.c/(S.score.c+S.score.w||1))*100);
    S.unitScores[S.activeUnit.id] = pct;
    save(); render();
  }
}

      const d=el('div',cls); d.textContent='🔊 '+gr;
      d.onclick=()=>handleMGr(gr);
      mcL.appendChild(d);
    });
    S.ex.rl.forEach(ru=>{
      const pair=S.ex.pairs.find(p=>p.ru===ru);
      let cls='mi';
      if(S.mDone.includes(pair?.greek)) cls+=' mm';
      else if(S.mSelRu===ru) cls+=' ms';
      else if(S.mWrong.includes(ru)) cls+=' mw';
      const d=el('div',cls); d.textContent=ru;
      d.onclick=()=>handleMRu(ru);
      mcR.appendChild(d);
    });
    mg.appendChild(mcL); mg.appendChild(mcR); ew.appendChild(mg);
    if(S.mDoneAll){
      const nb=el('button','btn bpr bfw'); nb.textContent='Далее →';
      nb.onclick=()=>advance(true); ew.appendChild(nb);
    }
  }

  return ew;
}

function doWrite(){
  const ok=S.wv.trim().toLowerCase()===S.ex.word.greek.toLowerCase();
  S.ws=ok?'ok':'fl'; render();
  setTimeout(()=>advance(ok),1300);
}

function handleMGr(gr){
  speak(gr);
  if(S.mDone.includes(gr)) return;
  if(S.mSelRu){
    const pair=S.ex.pairs.find(p=>p.greek===gr);
    if(pair&&pair.ru===S.mSelRu){
      S.mDone=[...S.mDone,gr]; S.mSelGr=null; S.mSelRu=null;
      if(S.mDone.length===S.ex.pairs.length) S.mDoneAll=true;
    } else { S.mWrong=[gr,S.mSelRu]; setTimeout(()=>{S.mWrong=[];S.mSelGr=null;S.mSelRu=null;render();},700); }
  } else S.mSelGr=gr;
  render();
}
function handleMRu(ru){
  const pGr=S.ex.pairs.find(p=>p.ru===ru)?.greek;
  if(S.mDone.includes(pGr)) return;
  if(S.mSelGr){
    const pair=S.ex.pairs.find(p=>p.greek===S.mSelGr);
    if(pair&&pair.ru===ru){
      S.mDone=[...S.mDone,S.mSelGr]; S.mSelGr=null; S.mSelRu=null;
      if(S.mDone.length===S.ex.pairs.length) S.mDoneAll=true;
    } else { S.mWrong=[S.mSelGr,ru]; setTimeout(()=>{S.mWrong=[];S.mSelGr=null;S.mSelRu=null;render();},700); }
  } else S.mSelRu=ru;
  render();
}

// ─── WORDS ────────────────────────────────────────────────
function renderWords(){
  const sc=el('div','sc');
  const q=S.wlSearch.toLowerCase();
  const filtered=ALL_WORDS.filter(w=>!q||w.greek.toLowerCase().includes(q)||w.ru.toLowerCase().includes(q));
  const totalPages=Math.ceil(filtered.length/PER_PAGE);
  if(S.wlPage>=totalPages) S.wlPage=0;
  const pageWords=filtered.slice(S.wlPage*PER_PAGE,(S.wlPage+1)*PER_PAGE);
  const allCk=pageWords.length>0&&pageWords.every(w=>S.checked.has(w.id));

  // Search + scroll-to-end
  const wlt=el('div','wlt');
  const inp=el('input','wls'); inp.placeholder='Поиск...'; inp.value=S.wlSearch;
  inp.oninput=e=>{ S.wlSearch=e.target.value; S.wlPage=0; render(); };
  wlt.appendChild(inp);
  const eb=el('button','wleb'); eb.textContent='↓ Конец';
  eb.onclick=()=>{ document.getElementById('wl-end')?.scrollIntoView({behavior:'smooth'}); };
  wlt.appendChild(eb);
  sc.appendChild(wlt);

  // Select all
  const sar=el('div','sar');
  const cb=el('input'); cb.type='checkbox'; cb.className='cb3'; cb.checked=allCk;
  cb.onchange=()=>{
    const ids=pageWords.map(w=>w.id);
    ids.forEach(id=>allCk?S.checked.delete(id):S.checked.add(id));
    save(); render();
  };
  sar.appendChild(cb);
  const sal=el('span'); sal.textContent='Выбрать все на стр.'; sar.appendChild(sal);
  const sc2=el('span'); sc2.style.cssText='margin-left:auto;color:var(--acc3)';
  sc2.textContent=`⚡ ${S.checked.size} в практике`; sar.appendChild(sc2);
  sc.appendChild(sar);

  // Grouped words
  const groups={};
  pageWords.forEach(w=>{ (groups[w.cat]=groups[w.cat]||[]).push(w); });
  Object.entries(groups).forEach(([cat,words])=>{
    const cl=el('div','cl'); cl.textContent=`${cat} (${words.length})`; sc.appendChild(cl);
    words.forEach(w=>{
      const wr=el('div','wr');
      const wc=el('input'); wc.type='checkbox'; wc.className='cb3'; wc.checked=S.checked.has(w.id);
      wc.onchange=()=>{ S.checked.has(w.id)?S.checked.delete(w.id):S.checked.add(w.id); save(); render(); };
      const we=el('div','we'); we.textContent=w.emoji;
      const wg=el('div','wg'); wg.textContent=w.greek;
      const wru=el('div','wru'); wru.textContent=w.ru;
      const wsp=el('button','wsp'); wsp.textContent='🔊'; wsp.onclick=()=>speak(w.greek);
      wr.appendChild(wc); wr.appendChild(we); wr.appendChild(wg); wr.appendChild(wru); wr.appendChild(wsp);
      sc.appendChild(wr);
    });
  });

  const endDiv=el('div'); endDiv.id='wl-end'; sc.appendChild(endDiv);

  // Pagination
  if(totalPages>1){
    const pn=el('div','pn');
    for(let i=0;i<totalPages;i++){
      const pb=el('button','pgb'+(S.wlPage===i?' pa':'')); pb.textContent=i+1;
      pb.onclick=(()=>{ const p=i; return ()=>{ S.wlPage=p; save(); render(); }; })();
      pn.appendChild(pb);
    }
    sc.appendChild(pn);
  }

  return sc;
}

// ─── PRACTICE ─────────────────────────────────────────────
const pracWords=()=>ALL_WORDS.filter(w=>S.checked.has(w.id));

function buildPEx(){
  const pw=pracWords();
  if(!pw.length){ S.pEx=null; return; }
  const word=pw[Math.floor(Math.random()*pw.length)];
  const others=pw.filter(w=>w.id!==word.id);
  const fb=ALL_WORDS.filter(w=>w.id!==word.id);
  const r=Math.random();
  if(r<0.35){
    S.pEx={t:'FC',word,dir:Math.random()>.5?'grToRu':'ruToGr'}; S.pFcRev=false;
  } else if(r<0.65){
    const opts=shuffle([word,...pick(others.length>=3?others:fb,3)]);
    S.pEx={t:'CH',word,opts}; S.pChosen=null;
  } else {
    const pairs=shuffle([word,...pick(others.length>=3?others:fb,3)]);
    S.pEx={t:'MA',word,pairs,ll:shuffle(pairs.map(p=>p.greek)),rl:shuffle(pairs.map(p=>p.ru))};
    S.pMSelL=null; S.pMSelR=null; S.pMDone=[]; S.pMWrong=[];
  }
}

function renderPractice(){
  const pw=pracWords();
  if(!pw.length){
    const sc=el('div','sc');
    sc.innerHTML=`<div class="pe"><div style="font-size:44px;margin-bottom:12px">📋</div><div style="font-size:15px;font-weight:700;margin-bottom:8px">Нет слов для практики</div><div style="font-size:13px">Отметь галочкой в разделе «Слова»</div></div>`;
    return sc;
  }
  if(!S.pEx){ buildPEx(); }
  const sc=el('div','sc');
  const info=el('div'); info.style.cssText='text-align:right;margin-bottom:10px;font-size:12px;color:var(--mu)';
  info.textContent=`⚡ ${pw.length} слов`; sc.appendChild(info);

  if(S.pEx.t==='FC'){
    const word=S.pEx.word;
    const isGR=S.pEx.dir==='grToRu';
    const card=el('div','card cc');
    card.onmousedown=()=>{ lpTimer=setTimeout(()=>{ S.popup={word}; render(); },650); };
    card.onmouseup=card.onmouseleave=()=>clearTimeout(lpTimer);
    card.ontouchstart=()=>{ lpTimer=setTimeout(()=>{ S.popup={word}; render(); },650); };
    card.ontouchend=()=>clearTimeout(lpTimer);
    const em=el('div','be'); em.textContent=word.emoji; card.appendChild(em);
    if(isGR){
      const row=el('div'); row.style.cssText='display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:4px';
      const w=el('div'); w.style.cssText='font-family:Unbounded,sans-serif;font-size:20px;font-weight:700'; w.textContent=word.greek;
      const sb=el('button','spk'); sb.textContent='🔊'; sb.onclick=e=>{e.stopPropagation();speak(word.greek);};
      row.appendChild(w); row.appendChild(sb); card.appendChild(row);
    } else {
      const w=el('div'); w.style.cssText='font-family:Unbounded,sans-serif;font-size:20px;font-weight:700;color:var(--acc3);margin-bottom:4px';
      w.textContent=word.ru; card.appendChild(w);
    }
    if(!S.pFcRev){
      const sb2=el('button','btn bot'); sb2.style.cssText='margin-top:14px;flex:unset;padding:9px 22px';
      sb2.textContent='Показать '+(isGR?'перевод':'по-гречески');
      sb2.onclick=()=>{ S.pFcRev=true; render(); }; card.appendChild(sb2);
    } else {
      const ans=el('div','fca');
      if(isGR){ ans.textContent=word.ru; }
      else {
        const row=el('div'); row.style.cssText='display:flex;align-items:center;justify-content:center;gap:8px';
        const w=el('span'); w.textContent=word.greek;
        const sb=el('button','spk'); sb.textContent='🔊'; sb.onclick=e=>{e.stopPropagation();speak(word.greek);};
        row.appendChild(w); row.appendChild(sb); ans.appendChild(row);
      }
      card.appendChild(ans);
      const fcr=el('div','fcr');
      const nb=el('button','btn ber'); nb.textContent='Не знал'; nb.onclick=()=>{ buildPEx(); render(); };
      const yb=el('button','btn bok'); yb.textContent='Знал! ✅'; yb.onclick=()=>{ buildPEx(); render(); };
      fcr.appendChild(nb); fcr.appendChild(yb); card.appendChild(fcr);
    }
    sc.appendChild(card);
  }

  else if(S.pEx.t==='CH'){
    const word=S.pEx.word;
    const card=el('div','card cc');
    card.onmousedown=()=>{ lpTimer=setTimeout(()=>{ S.popup={word}; render(); },650); };
    card.onmouseup=card.onmouseleave=()=>clearTimeout(lpTimer);
    card.ontouchstart=()=>{ lpTimer=setTimeout(()=>{ S.popup={word}; render(); },650); };
    card.ontouchend=()=>clearTimeout(lpTimer);
    const em=el('div','be'); em.textContent=word.emoji; card.appendChild(em);
    const row=el('div'); row.style.cssText='display:flex;align-items:center;justify-content:center;gap:8px';
    const w=el('div'); w.style.cssText='font-family:Unbounded,sans-serif;font-size:20px;font-weight:700'; w.textContent=word.greek;
    const sb=el('button','spk'); sb.textContent='🔊'; sb.onclick=e=>{e.stopPropagation();speak(word.greek);};
    row.appendChild(w); row.appendChild(sb); card.appendChild(row);
    sc.appendChild(card);
    const chs=el('div','chs'); chs.style.marginTop='10px';
    S.pEx.opts.forEach(o=>{
      let cls='cb2';
      if(S.pChosen){ if(o.id===word.id) cls+=' ck'; else if(o.id===S.pChosen) cls+=' cw'; }
      const b=el('button',cls); b.textContent=o.ru;
      if(S.pChosen) b.disabled=true;
      b.onclick=()=>{ S.pChosen=o.id; render(); setTimeout(()=>{ buildPEx(); render(); },1000); };
      chs.appendChild(b);
    });
    sc.appendChild(chs);
  }

  else if(S.pEx.t==='MA'){
    const lbl=el('div'); lbl.style.cssText='font-size:10px;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px';
    lbl.textContent='Соедини · 🔊 = озвучка · удержи = убрать из практики'; sc.appendChild(lbl);
    const mg=el('div','mg');
    const mcL=el('div','mc'), mcR=el('div','mc');
    S.pEx.ll.forEach(gr=>{
      const isD=S.pMDone.includes(gr);
      let cls='mi'+(isD?' mm':S.pMSelL===gr?' ms':S.pMWrong.includes(gr)?' mw':'');
      const d=el('div',cls); d.textContent='🔊 '+gr;
      d.onclick=()=>handlePL(gr);
      d.onmousedown=()=>{ const pair=S.pEx.pairs.find(p=>p.greek===gr); lpTimer=setTimeout(()=>{ S.popup={word:pair}; render(); },650); };
      d.onmouseup=d.onmouseleave=()=>clearTimeout(lpTimer);
      d.ontouchstart=()=>{ const pair=S.pEx.pairs.find(p=>p.greek===gr); lpTimer=setTimeout(()=>{ S.popup={word:pair}; render(); },650); };
      d.ontouchend=()=>clearTimeout(lpTimer);
      mcL.appendChild(d);
    });
    S.pEx.rl.forEach(ru=>{
      const pGr=S.pEx.pairs.find(p=>p.ru===ru)?.greek;
      const isD=S.pMDone.includes(pGr);
      let cls='mi'+(isD?' mm':S.pMSelR===ru?' ms':S.pMWrong.includes(ru)?' mw':'');
      const d=el('div',cls); d.textContent=ru;
      d.onclick=()=>handlePR(ru);
      mcL.parentNode; mcR.appendChild(d);
    });
    mg.appendChild(mcL); mg.appendChild(mcR); sc.appendChild(mg);
  }

  return sc;
}

function handlePL(gr){
  speak(gr);
  if(S.pMDone.includes(gr)) return;
  if(S.pMSelR){
    const pair=S.pEx.pairs.find(p=>p.greek===gr);
    if(pair&&pair.ru===S.pMSelR){
      S.pMDone=[...S.pMDone,gr]; S.pMSelL=null; S.pMSelR=null;
      if(S.pMDone.length===S.pEx.pairs.length) setTimeout(()=>{ buildPEx(); render(); },600);
    } else { S.pMWrong=[gr,S.pMSelR]; setTimeout(()=>{S.pMWrong=[];S.pMSelL=null;S.pMSelR=null;render();},700); }
  } else S.pMSelL=gr;
  render();
}
function handlePR(ru){
  const pGr=S.pEx.pairs.find(p=>p.ru===ru)?.greek;
  if(S.pMDone.includes(pGr)) return;
  if(S.pMSelL){
    const pair=S.pEx.pairs.find(p=>p.greek===S.pMSelL);
    if(pair&&pair.ru===ru){
      S.pMDone=[...S.pMDone,S.pMSelL]; S.pMSelL=null; S.pMSelR=null;
      if(S.pMDone.length===S.pEx.pairs.length) setTimeout(()=>{ buildPEx(); render(); },600);
    } else { S.pMWrong=[S.pMSelL,ru]; setTimeout(()=>{S.pMWrong=[];S.pMSelL=null;S.pMSelR=null;render();},700); }
  } else S.pMSelR=ru;
  render();
}

// ─── POPUPS ───────────────────────────────────────────────
function renderPopup(){
  const po=el('div','po');
  po.onclick=()=>{ S.popup=null; render(); };
  const pb=el('div','pb2');
  pb.onclick=e=>e.stopPropagation();
  const pt=el('div','popt'); pt.textContent=S.popup.word?.greek; pb.appendChild(pt);
  const pu=el('div','popu'); pu.textContent='Убрать из практики слов?'; pb.appendChild(pu);
  const br=el('div','br');
  const nb=el('button','btn bot'); nb.textContent='Нет'; nb.onclick=()=>{ S.popup=null; render(); };
  const yb=el('button','btn ber'); yb.textContent='Да, убрать';
  yb.onclick=()=>{ if(S.popup.word) S.checked.delete(S.popup.word.id); S.popup=null; save(); showToast('Убрано из практики'); };

}

  const wp=el('div','wp');
  const wt=el('div'); wt.style.cssText='font-family:Unbounded,sans-serif;font-size:15px;margin-bottom:3px';

  return wp;
}
